<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090f;--sur:#0d1522;--sur2:#101c2e;--bor:#1a2b40;--txt:#eef2ff;--mut:#4e6a8a;--dim:#253548;--grn:#00d68f;--gdm:#001912;--gbr:#00361f;--grn2:#009e68;--blue:#4f8ef7;--purple:#7c52f5;--gold:#f0960a;--red:#e83535;}
html,body{background:var(--bg);color:var(--txt);font-family:"Inter",system-ui,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:"Inter",system-ui,sans-serif}
input::placeholder,textarea::placeholder{color:var(--dim)}
select option{background:var(--sur)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bor);border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.page{display:none}.page.on{display:flex}
#login-page{min-height:100vh;background:radial-gradient(ellipse at 30% 20%,#0d2235,var(--bg) 60%),radial-gradient(ellipse at 80% 80%,#0d1f0d,transparent 50%);align-items:center;justify-content:center;padding:20px}
#app-page{min-height:100vh;flex-direction:column}
#app-layout{display:flex;flex:1;min-height:0}
#sidebar{width:240px;background:var(--sur);border-right:1px solid var(--bor);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;padding:0 12px;flex-shrink:0;overflow-y:auto}
.nbtn{width:100%;padding:10px 12px;border-radius:10px;border:none;background:transparent;color:var(--mut);font-weight:500;font-size:13px;display:flex;align-items:center;gap:10px;margin-bottom:2px;text-align:left;border-left:3px solid transparent;cursor:pointer;transition:all .15s}
.nbtn:hover{background:var(--sur2);color:var(--txt)}.nbtn.on{background:linear-gradient(135deg,var(--gdm),#001a2e);color:var(--grn);font-weight:700;border-left-color:var(--grn)}
.nbtn .nic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--sur2);flex-shrink:0}.nbtn.on .nic{background:var(--gdm)}
#main-col{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{background:var(--sur);border-bottom:1px solid var(--bor);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50;flex-shrink:0}
#page-body{flex:1;overflow-y:auto;padding:28px 32px}
#mob-bar{display:none;background:var(--sur);border-bottom:1px solid var(--bor);height:56px;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:50;flex-shrink:0}
#bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bor);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
#drawer-bg{display:none;position:fixed;inset:0;background:#000b;z-index:200}
#drawer{display:none;position:fixed;left:0;top:0;bottom:0;width:260px;z-index:201;background:var(--sur);border-right:1px solid var(--bor);overflow-y:auto;padding:0 12px}
#prof-drop{display:none;position:fixed;top:62px;right:20px;background:var(--sur);border:1px solid var(--bor);border-radius:16px;padding:8px;width:240px;box-shadow:0 20px 60px #000b;z-index:500;animation:fadeUp .15s}
.pmitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .15s;border:none;background:transparent;width:100%;text-align:left;color:var(--txt);font-size:13px}.pmitem:hover{background:var(--sur2)}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:20px}
.csm{background:var(--sur);border:1px solid var(--bor);border-radius:11px;padding:12px 15px}
.hero{background:linear-gradient(135deg,#001a12,#001228 50%,#07090f);border:1px solid #00d68f12;border-radius:16px;padding:28px 24px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,#00e5a008,transparent 70%)}
.sc{border-radius:12px;padding:18px;position:relative;overflow:hidden;border:1px solid var(--bor)}
.inp{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--bor);background:var(--sur2);color:var(--txt);font-size:13px;outline:none;transition:border-color .2s}.inp:focus{border-color:var(--grn)}
.lbl{color:var(--mut);font-size:10px;letter-spacing:1.5px;margin-bottom:6px;display:block;font-weight:700;text-transform:uppercase}
.bp{padding:11px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,#0d1f4a,#3a7aed);color:#fff;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s}.bp:hover{transform:translateY(-1px);box-shadow:0 8px 24px #00e5a030}
.bs{padding:9px 16px;border-radius:10px;border:1px solid var(--bor);background:transparent;color:var(--mut);font-weight:600;font-size:12px;cursor:pointer;transition:all .15s}.bs:hover{border-color:var(--grn);color:var(--grn)}
.bd{padding:9px 16px;border-radius:10px;border:1px solid #7f1d1d;background:transparent;color:#f87171;font-weight:600;font-size:12px;cursor:pointer}
.ba{padding:8px 14px;border-radius:10px;border:1px solid var(--gbr);background:var(--gdm);color:var(--grn);font-weight:700;font-size:12px;cursor:pointer;transition:all .15s}.ba:hover{background:#002a1a}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.fc{display:flex;flex-direction:column;gap:16px}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap}
.tab-row{display:flex;gap:4px;background:var(--sur2);border-radius:12px;padding:4px;border:1px solid var(--bor);flex-wrap:wrap}
.tab-btn{flex:1;padding:8px 16px;border-radius:9px;border:none;background:transparent;color:var(--mut);font-weight:600;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:Inter,sans-serif}
.tab-btn.on{background:var(--sur);color:var(--grn);font-weight:700;box-shadow:0 2px 8px #0006}
/* PAYMENT SHEET */
.sheet-wrap{overflow-x:auto}
.sheet{border-collapse:collapse;min-width:600px;width:100%;font-size:12px}
.sheet th{background:var(--sur2);color:var(--mut);font-size:9px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;padding:10px 12px;border:1px solid var(--bor);white-space:nowrap;position:sticky;top:0;z-index:2}
.sheet th:first-child{position:sticky;left:0;z-index:3;background:var(--sur2);min-width:150px}
.sheet td{padding:9px 12px;border:1px solid var(--bor);vertical-align:middle;white-space:nowrap}
.sheet td:first-child{position:sticky;left:0;background:var(--sur);z-index:1}
.sheet tr:hover td{background:#ffffff05}.sheet tr:hover td:first-child{background:var(--sur2)}
.cell-paid{background:#001f1480;color:var(--grn);font-weight:700;text-align:center;cursor:default}
.cell-unpaid{background:#1a040480;color:#ef4444;font-weight:600;text-align:center}
.sheet tfoot td{background:var(--sur2);font-weight:800;font-size:11px;border-top:2px solid var(--bor)}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:12px 16px;text-align:left;color:var(--mut);font-size:10px;letter-spacing:1.5px;font-weight:700;background:var(--sur2);text-transform:uppercase}
.tbl td{padding:13px 16px;border-top:1px solid var(--bor);vertical-align:middle}
.tbl tr:hover td{background:var(--sur2)}
.tbl thead tr th:first-child{border-radius:10px 0 0 10px}.tbl thead tr th:last-child{border-radius:0 10px 10px 0}
/* MODAL */
.movl{position:fixed;inset:0;background:#000d;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
.mbox{background:var(--sur);border:1px solid var(--bor);border-radius:20px;padding:28px;width:100%;max-width:500px;animation:fadeUp .2s;max-height:92vh;overflow-y:auto;box-shadow:0 32px 80px #000c}
#toast{position:fixed;top:24px;right:24px;z-index:9999;display:none;align-items:center;gap:10px;padding:13px 20px;border-radius:14px;font-weight:600;font-size:13px;box-shadow:0 12px 40px #0009;max-width:320px;animation:fadeUp .2s}
.pbar{height:7px;background:var(--sur2);border-radius:99px;overflow:hidden}
.pfill{height:100%;border-radius:99px;transition:width 1s ease}
.spin{width:36px;height:36px;border:3px solid var(--bor);border-top:3px solid var(--grn);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);display:inline-block;animation:pulse 2s infinite;margin-right:6px}
.vbar{height:6px;background:var(--sur2);border-radius:99px;overflow:hidden;position:relative}
.vbar-y{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--gbr),var(--grn));border-radius:99px;transition:width .6s}
.vbar-n{position:absolute;right:0;top:0;bottom:0;background:#ef444460;border-radius:99px;transition:width .6s}
/* CHART */
.chart-wrap{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 4px}
.chart-bar-g{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.chart-bar{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .6s ease}
.chart-lbl{font-size:8px;color:var(--dim);white-space:nowrap;font-weight:600}
/* REPORT */
@media print{body{background:#fff!important;color:#000!important}.no-print{display:none!important}#topbar,#sidebar,#mob-bar,#bot-nav{display:none!important}#page-body{padding:0!important}}
@media(max-width:820px){

  #app-layout{flex-direction:column}#main-col{width:100vw;max-width:100vw}
  #page-body{padding:16px 14px 84px;overflow-x:hidden}
  .g4{grid-template-columns:1fr 1fr!important}.g3{grid-template-columns:1fr!important}
  .hero{padding:22px 18px}.movl{align-items:flex-end;padding:0}.mbox{border-radius:22px 22px 0 0;max-width:100%}
  #prof-drop{right:10px;width:220px}.g2.rsp{grid-template-columns:1fr!important}
}
@media(min-width:821px){.mob-only{display:none!important}}
