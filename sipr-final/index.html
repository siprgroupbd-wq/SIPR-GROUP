<meta name="theme-color" content="#10b981"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="robots" content="noindex,nofollow"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a12;--sur:#0d1424;--sur2:#111b2e;--bor:#1e2d45;
  --txt:#f0f4ff;--mut:#5a7090;--dim:#2a3a52;
  --grn:#00e5a0;--gdm:#001f14;--gbr:#003d28;
  --grn2:#00b87a;--blue:#3b82f6;--purple:#8b5cf6;
  --gold:#f59e0b;--red:#ef4444;
}
html,body{background:var(--bg);color:var(--txt);font-family:"Inter",system-ui,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:"Inter",system-ui,sans-serif}
input::placeholder,textarea::placeholder{color:var(--dim)}
select option{background:var(--sur)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bor);border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── PAGES ── */
.page{display:none}.page.on{display:flex}
#login-page{min-height:100vh;background:radial-gradient(ellipse at 30% 20%,#0d2235 0%,var(--bg) 60%),radial-gradient(ellipse at 80% 80%,#0d1f0d 0%,transparent 50%);align-items:center;justify-content:center;padding:20px}
#app-page{min-height:100vh;flex-direction:column}
#app-layout{display:flex;flex:1;min-height:0}

/* ── SIDEBAR ── */
#sidebar{width:240px;background:var(--sur);border-right:1px solid var(--bor);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;padding:0 12px;flex-shrink:0;overflow-y:auto}
.nbtn{width:100%;padding:10px 12px;border-radius:10px;border:none;background:transparent;color:var(--mut);font-weight:500;font-size:13px;display:flex;align-items:center;gap:10px;margin-bottom:2px;text-align:left;border-left:3px solid transparent;cursor:pointer;transition:all .15s}
.nbtn:hover{background:var(--sur2);color:var(--txt)}
.nbtn.on{background:linear-gradient(135deg,var(--gdm),#001a2e);color:var(--grn);font-weight:700;border-left-color:var(--grn);box-shadow:inset 0 0 20px #00e5a008}
.nbtn .nic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--sur2);flex-shrink:0;transition:all .15s}
.nbtn.on .nic{background:var(--gdm)}

/* ── MAIN ── */
#main-col{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{background:var(--sur);border-bottom:1px solid var(--bor);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50;flex-shrink:0;backdrop-filter:blur(10px)}
#page-body{flex:1;overflow-y:auto;padding:28px 32px}

/* ── MOBILE ── */
#mob-bar{display:none;background:var(--sur);border-bottom:1px solid var(--bor);height:56px;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:50;flex-shrink:0}
#bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bor);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
#drawer-bg{display:none;position:fixed;inset:0;background:#000b;z-index:200}
#drawer{display:none;position:fixed;left:0;top:0;bottom:0;width:250px;z-index:201;background:var(--sur);border-right:1px solid var(--bor);overflow-y:auto;padding:0 12px}

/* ── PROFILE DROPDOWN ── */
#prof-drop{display:none;position:fixed;top:62px;right:20px;background:var(--sur);border:1px solid var(--bor);border-radius:16px;padding:8px;width:240px;box-shadow:0 20px 60px #000b;z-index:500;animation:fadeUp .15s}
.pmitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .15s;border:none;background:transparent;width:100%;text-align:left;color:var(--txt);font-size:13px}
.pmitem:hover{background:var(--sur2)}

/* ── CARDS ── */
.card{background:var(--sur);border:1px solid var(--bor);border-radius:18px;padding:20px}
.card2{background:var(--sur2);border:1px solid var(--bor);border-radius:14px;padding:16px}
.hero{background:linear-gradient(135deg,#001f14 0%,#001428 50%,#060a12 100%);border:1px solid #00e5a015;border-radius:22px;padding:32px 28px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,#00e5a008,transparent 70%)}
.hero::after{content:"";position:absolute;bottom:-40px;left:30%;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,#3b82f606,transparent 70%)}

/* ── STAT CARDS ── */
.sc{border-radius:18px;padding:20px;position:relative;overflow:hidden;border:1px solid var(--bor)}
.sc::after{content:"";position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06}

/* ── INPUTS ── */
.inp{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--bor);background:var(--sur2);color:var(--txt);font-size:13px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--grn)}
.lbl{color:var(--mut);font-size:10px;letter-spacing:1.5px;margin-bottom:6px;display:block;font-weight:700;text-transform:uppercase}

/* ── BUTTONS ── */
.bp{padding:11px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,#003d28,#00b87a);color:#fff;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.bp:hover{transform:translateY(-1px);box-shadow:0 8px 24px #00e5a030}
.bs{padding:9px 16px;border-radius:10px;border:1px solid var(--bor);background:transparent;color:var(--mut);font-weight:600;font-size:12px;cursor:pointer;transition:all .15s}
.bs:hover{border-color:var(--grn);color:var(--grn)}
.bd{padding:9px 16px;border-radius:10px;border:1px solid #7f1d1d;background:transparent;color:#f87171;font-weight:600;font-size:12px;cursor:pointer}
.ba{padding:8px 14px;border-radius:10px;border:1px solid var(--gbr);background:var(--gdm);color:var(--grn);font-weight:700;font-size:12px;cursor:pointer;transition:all .15s}
.ba:hover{background:#002a1a}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.fc{display:flex;flex-direction:column;gap:16px}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap;letter-spacing:.3px}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:12px 16px;text-align:left;color:var(--mut);font-size:10px;letter-spacing:1.5px;font-weight:700;background:var(--sur2);text-transform:uppercase}
.tbl td{padding:13px 16px;border-top:1px solid var(--bor);vertical-align:middle}
.tbl tr:hover td{background:var(--sur2)}
.tbl thead tr th:first-child{border-radius:10px 0 0 10px}
.tbl thead tr th:last-child{border-radius:0 10px 10px 0}

/* ── MODAL ── */
.movl{position:fixed;inset:0;background:#000d;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
.mbox{background:var(--sur);border:1px solid var(--bor);border-radius:20px;padding:28px;width:100%;max-width:500px;animation:fadeUp .2s;max-height:92vh;overflow-y:auto;box-shadow:0 32px 80px #000c}

/* ── TOAST ── */
#toast{position:fixed;top:24px;right:24px;z-index:9999;display:none;align-items:center;gap:10px;padding:13px 20px;border-radius:14px;font-weight:600;font-size:13px;box-shadow:0 12px 40px #0009;max-width:320px;animation:fadeUp .2s}

/* ── MISC ── */
.pbar{height:7px;background:var(--sur2);border-radius:99px;overflow:hidden}
.pfill{height:100%;border-radius:99px;transition:width 1s ease}
.spin{width:36px;height:36px;border:3px solid var(--bor);border-top:3px solid var(--grn);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
.divider{height:1px;background:var(--bor);margin:4px 0}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);display:inline-block;animation:pulse 2s infinite;margin-right:6px}

/* ── RESPONSIVE ── */
@media(max-width:820px){
  #sidebar{display:none!important}
  #topbar{display:none!important}
  #mob-bar{display:flex!important}
  #bot-nav{display:flex!important}
  #app-layout{flex-direction:column}
  #main-col{width:100vw;max-width:100vw}
  #page-body{padding:16px 14px 80px;overflow-x:hidden}
  .g4{grid-template-columns:1fr 1fr!important}
  .g3{grid-template-columns:1fr!important}
  .stack{grid-template-columns:1fr!important}
  .hero{padding:22px 18px}
  .movl{align-items:flex-end;padding:0}
  .mbox{border-radius:22px 22px 0 0;max-width:100%}
  #prof-drop{right:10px;width:220px}
  #page-body .g2.rsp{grid-template-columns:1fr!important}
}
@media(min-width:821px){.mob-only{display:none!important}}
</style>

function $(id){return document.getElementById(id);}

function fmt(n){
  var v = Number(n||0);
  return "BDT " + v.toLocaleString("en-BD");
}
function fmtShort(n){
  var v = Number(n||0);
  if(v>=100000) return "BDT "+( v/100000).toFixed(1)+"L";
  if(v>=1000)   return "BDT "+(v/1000).toFixed(1)+"K";
  return "BDT "+v.toLocaleString("en-BD");
}
function fd(d){return new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});}
function sumT(arr,t){return arr.filter(function(x){return x.type===t;}).reduce(function(s,x){return s+Number(x.amount);},0);}
function pct(v,mx){return Math.min(Math.round((v/mx)*100),100);}

function av(name, sz){
  sz = sz||38;
  var hue = name.split("").reduce(function(a,c){return a+c.charCodeAt(0);},0)%360;
  var hue2 = (hue+50)%360;
  var ini = name.split(" ").map(function(w){return w[0]||"";}).join("").slice(0,2).toUpperCase();
  var fs = Math.round(sz*0.36);
  return "<div style='width:"+sz+"px;height:"+sz+"px;border-radius:50%;flex-shrink:0;"+
    "background:linear-gradient(135deg,hsl("+hue+",50%,22%),hsl("+hue2+",60%,38%));"+
    "display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;"+
    "font-size:"+fs+"px;user-select:none;border:2px solid hsl("+hue+",40%,30%)'>"+ini+"</div>";
}

function getMem(email){
  return S.mems.find(function(m){return m.email===email;})||{};
}
function getMyMem(){return getMem(S.email);}
function getMemByUID(uid){return S.mems.find(function(m){return m.id===uid;})||null;}
function uidToName(uid){var m=getMemByUID(uid);return m?m.name:uid;}
// Match tx to member — use uid first (permanent), then email, then name (legacy)
// Map old text UIDs to new SIPR26 IDs
var OLD_UID_MAP = {
  "jaziro":"SIPR26-JH-6729","shoeb":"SIPR26-SH-4688",
  "sazid":"SIPR26-SA-9514","rizvi":"SIPR26-RI-5469",
  "ahad":"SIPR26-AB-5111","jobaid":"SIPR26-JO-5177",
  "akib":"SIPR26-AK-2307","fahim":"SIPR26-FA-4934","imtiaz":"SIPR26-IM-2838"
};
var NAME_TO_UID = {
  "jahed aziz":"SIPR26-JH-6729","jaziro":"SIPR26-JH-6729","jfytdyd":"SIPR26-JH-6729",
  "shoeb":"SIPR26-SH-4688",
  "sajid":"SIPR26-SA-9514","radio sazid":"SIPR26-SA-9514","sazid":"SIPR26-SA-9514",
  "rizvi":"SIPR26-RI-5469","rizvijvvg":"SIPR26-RI-5469",
  "abu tajbit":"SIPR26-AB-5111","abu waseeo ahad":"SIPR26-AB-5111",
  "jobaid hosain":"SIPR26-JO-5177",
  "akib ahmed":"SIPR26-AK-2307","akib ahm":"SIPR26-AK-2307","akib":"SIPR26-AK-2307",
  "fahim":"SIPR26-FA-4934",
  "imtiaz":"SIPR26-IM-2838","imti":"SIPR26-IM-2838","imtl":"SIPR26-IM-2838"
};
function resolveUID(t){
  if(t.memberUID&&t.memberUID.indexOf("SIPR26")===0) return t.memberUID;
  if(t.memberUID&&OLD_UID_MAP[t.memberUID.toLowerCase()]) return OLD_UID_MAP[t.memberUID.toLowerCase()];
  if(t.memberEmail){var mx=S.mems.find(function(x){return x.email===t.memberEmail;});if(mx)return mx.id;}
  if(t.member){var uid=NAME_TO_UID[t.member.toLowerCase().trim()];if(uid)return uid;}
  return null;
}
function txMatchesMem(t,mem){
  var uid=resolveUID(t); if(uid) return uid===mem.id;
  return t.member===mem.name;
}
// Get display name for a transaction using UID lookup
function txDisplayName(t){
  var uid=resolveUID(t);
  if(uid){var m=getMemByUID(uid);if(m)return m.name;}
  return t.member||"Unknown";
}

  // ── INIT ──
  initApp:function(){
    // Load members from Firebase first
    db.collection("members").get().then(function(snap){
      if(snap.empty){
        // First time — seed default members
        var batch = db.batch();
        DEFAULT_MEMBERS.forEach(function(m){
          batch.set(db.collection("members").doc(m.id), m);
        });
        batch.commit().then(function(){
          S.mems = DEFAULT_MEMBERS.slice();
          A.afterMemLoad();
        });
      } else {
        var rawMems = snap.docs.map(function(d){
        var data=d.data();
        if(!data.id) data.id=d.id;
        return Object.assign({},data,{docId:d.id});
      });
      // Deduplicate by email - keep the one with a proper UID format
      var emailSeen = {};
      S.mems = [];
      rawMems.forEach(function(m){
        if(!m.email) return; // skip invalid
        if(!emailSeen[m.email]){
          emailSeen[m.email] = true;
          S.mems.push(m);
        } else {
          // Keep whichever has proper SIPR26 format ID
          var existing = S.mems.find(function(x){return x.email===m.email;});
          if(existing && m.id && m.id.indexOf("SIPR26") === 0){
            var idx = S.mems.indexOf(existing);
            S.mems[idx] = m;
          }
        }
      });
      // Sort by ID to keep consistent order
      S.mems.sort(function(a,b){return (a.id||"").localeCompare(b.id||"");});
        A.afterMemLoad();
      }
    }).catch(function(){
      S.mems = DEFAULT_MEMBERS.slice();
      A.afterMemLoad();
    });
  },

      // Deduplicate by email - keep the one with a proper UID format

        if(!emailSeen[m.email]){
          emailSeen[m.email] = true;
          S.mems.push(m);
        } else {
          // Keep whichever has proper SIPR26 format ID
          var existing = S.mems.find(function(x){return x.email===m.email;});
          if(existing && m.id && m.id.indexOf("SIPR26") === 0){
            var idx = S.mems.indexOf(existing);

          }

  // ── MIGRATION: Link old transactions to member UIDs ──
  migrateTransactions:function(){
    if(S.mems.length===0) return;
    // Build name→UID map including all known aliases
    var nameMap = {};
    S.mems.forEach(function(m){
      // Current name
      nameMap[m.name.toLowerCase()] = m.id;
      // Aliases stored in member doc
      if(m.aliases && Array.isArray(m.aliases)){
        m.aliases.forEach(function(a){ if(a) nameMap[a.toLowerCase()] = m.id; });
      }
    });
    
    // Also add hardcoded known name mappings for existing data
    var knownNames = {
      "jaziro":          S.mems.find(function(m){return m.id==="SIPR26-JH-6729";}),
      "jahed aziz":      S.mems.find(function(m){return m.id==="SIPR26-JH-6729";}),
      "shoeb":           S.mems.find(function(m){return m.id==="SIPR26-SH-4688";}),
      "radio sazid":     S.mems.find(function(m){return m.id==="SIPR26-SA-9514";}),
      "sajid":           S.mems.find(function(m){return m.id==="SIPR26-SA-9514";}),
      "rizvi":           S.mems.find(function(m){return m.id==="SIPR26-RI-5469";}),
      "abu waseeo ahad": S.mems.find(function(m){return m.id==="SIPR26-AB-5111";}),
      "abu tajbit":      S.mems.find(function(m){return m.id==="SIPR26-AB-5111";}),
      "jobaid hosain":   S.mems.find(function(m){return m.id==="SIPR26-JO-5177";}),
      "akib ahmed":      S.mems.find(function(m){return m.id==="SIPR26-AK-2307";}),
      "akib ahm":        S.mems.find(function(m){return m.id==="SIPR26-AK-2307";}),
      "rizvijvvg":       S.mems.find(function(m){return m.id==="SIPR26-RI-5469";}),
      "jfytdyd":         S.mems.find(function(m){return m.id==="SIPR26-JH-6729";}),
      "jahed aziz":      S.mems.find(function(m){return m.id==="SIPR26-JH-6729";}),
      "fahim":           S.mems.find(function(m){return m.id==="SIPR26-FA-4934";}),
      "imtiaz":          S.mems.find(function(m){return m.id==="SIPR26-IM-2838";}),
    };
    Object.keys(knownNames).forEach(function(n){
      if(knownNames[n]) nameMap[n] = knownNames[n].id;
    });

    // Find ALL transactions that don't have new SIPR26 format UID
    var toUpdate = S.txs.filter(function(t){
      return !t.memberUID || t.memberUID.indexOf("SIPR26") !== 0;
    });
    if(toUpdate.length === 0) return;
    
    var batch = db.batch();
    var count = 0;
    toUpdate.forEach(function(t){
      var uid = resolveUID(t);
      if(uid){
        // Also update the member name to current correct name
        var mem = S.mems.find(function(m){return m.id===uid;});
        var updateData = {memberUID: uid};
        if(mem) updateData.member = mem.name; // fix corrupted name too
        batch.set(db.collection("transactions").doc(t.id), updateData, {merge: true});
        count++;
      }
    });
    
    if(count > 0){
      batch.commit().then(function(){
        console.log("Migrated "+count+" transactions to use permanent UIDs");
      }).catch(function(e){
        console.error("Migration error:", e);
      });
    }
  },

  // ── RESET MEMBERS TO DEFAULT (fixes corrupted names) ──
  resetMembers:function(){
    if(!confirm("This will:\n\n1. DELETE all corrupted member data\n2. Recreate all 9 members with correct names\n3. Preserve all transaction history\n\nAre you sure?")) return;
    toast("Cleaning up... please wait.");
    // Step 1: Get ALL existing member docs and delete them
    db.collection("members").get().then(function(snap){
      var delBatch = db.batch();
      snap.docs.forEach(function(doc){
        delBatch.delete(doc.ref);
      });
      return delBatch.commit();
    }).then(function(){
      // Step 2: Create fresh clean member docs with correct UIDs
      var addBatch = db.batch();
      DEFAULT_MEMBERS.forEach(function(m){
        addBatch.set(db.collection("members").doc(m.id), m);
      });
      return addBatch.commit();
    }).then(function(){
      toast("Done! All members restored correctly.");
      setTimeout(function(){ window.location.reload(); }, 1500);
    }).catch(function(e){
      toast("Error: "+e.message, false);
    });
  },

  // ── STATS ──
  stats:function(){
    var d=sumT(S.txs,"deposit"),i=sumT(S.txs,"invest"),p=sumT(S.txs,"profit"),e=sumT(S.txs,"expense");
    return{d:d,i:i,p:p,e:e,f:d+p-i-e,roi:i>0?((p/i)*100).toFixed(1):"0.0"};
  },

  payS:function(y,m){
    return S.mems.map(function(mb){
      var tx=S.txs.find(function(t){
        return txMatchesMem(t,mb)&&t.type==="deposit"&&
               new Date(t.date).getFullYear()===y&&new Date(t.date).getMonth()===m;
      });
      return Object.assign({},mb,{paid:!!tx,paidDate:tx?tx.date:null,paidAmt:tx?tx.amount:0});
    });
  },

  mRows:function(){
    var map={};
    S.txs.forEach(function(t){
      var d=new Date(t.date),k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
      if(!map[k])map[k]={key:k,lab:MS[d.getMonth()]+" "+String(d.getFullYear()).slice(2),deposit:0,invest:0,profit:0,expense:0};
      map[k][t.type]+=Number(t.amount);
    });
    return Object.values(map).sort(function(a,b){return a.key.localeCompare(b.key);});
  },

        h+="<div class='inp' style='color:var(--mut);opacity:.6;cursor:not-allowed'>"+m.title+"</div>";
      } else {
        h+="<div style='display:flex;gap:8px'><select id='tl-"+sid+"' class='inp' style='flex:1'>";
        TITLES.forEach(function(t){h+="<option value='"+t+"'"+(t===m.title?" selected":"")+">"+t+"</option>";});
        h+="</select><button onclick='A.saveTitle(\""+m.email+"\",\""+sid+"\",\""+m.id+"\")' style='padding:9px 14px;border-radius:10px;border:1px solid var(--gbr);background:var(--gdm);color:var(--grn);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap'>Save</button></div>";
      }
      h+="</div>";
      // Role change
      h+="<div style='display:flex;align-items:center;gap:10px;flex-wrap:wrap'>";

      Object.keys(RC).forEach(function(k){
        if(k!==auth.role){
          var v=RC[k];
          h+="<button onclick='A.changeRole(\""+m.email+"\",\""+k+"\")' style='padding:6px 14px;border-radius:99px;border:1px solid "+v.C+"30;background:"+v.C+"10;color:"+v.C+";font-size:12px;font-weight:700;cursor:pointer'>&rarr; "+v.L+"</button>";

      });

    });
    h+="<div class='card' style='background:var(--sur2)'>";
    h+="<div style='font-size:11px;letter-spacing:2px;color:var(--mut);font-weight:700;margin-bottom:12px'>LOGIN CREDENTIALS</div>";
    h+="<div style='font-size:12px'>";
    S.mems.forEach(function(m){
      var auth=AUTH[m.email]||{role:"member"};
      var RC2={admin:"var(--red)",manager:"var(--gold)",member:"var(--grn)"};
      h+="<div style='display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bor)'>";

      h+="<div style='display:flex;align-items:center;gap:8px'>";
      h+="<span style='color:var(--mut)'>"+m.email+"</span>";
      h+="<span class='bdg' style='background:"+RC2[auth.role]+"18;color:"+RC2[auth.role]+";border:1px solid "+RC2[auth.role]+"30;font-size:9px'>"+auth.role.toUpperCase()+"</span>";
      h+="</div></div>";
    });
    h+="</div><div style='color:var(--dim);font-size:11px;margin-top:10px;font-weight:600'>&#128274; Passwords: FirstName@2026 (e.g. Jaziro@2026)</div></div>";
    h+="</div>";return h;
  },

  // User management save functions (all go to Firebase)
  saveName:function(email,sid){
    var v=document.getElementById("nm-"+sid);
    if(!v||!v.value.trim()){toast("Name cannot be empty.",false);return;}
    var newName=v.value.trim();
    var mem=S.mems.find(function(m){return m.email===email;});
    if(!mem){toast("Member not found.",false);return;}
    if(newName===mem.name){toast("Name is unchanged.",false);return;}
    // UID stays the same — just update the display name
    // All transactions linked by UID will automatically show new name
    db.collection("members").doc(mem.docId||mem.id).update({name:newName})
      .then(function(){
        if(email===S.email){S.name=newName;}
        toast("Name updated! All transaction history preserved via Member ID.");
      })
      .catch(function(e){toast("Error: "+e.message,false);});
  },
  savePhone:function(email,sid){
    var v=document.getElementById("ph-"+sid);
    if(!v){return;}
    var mem=S.mems.find(function(m){return m.email===email;});
    if(!mem)return;
    db.collection("members").doc(mem.docId||mem.id).update({phone:v.value.trim()})
      .then(function(){toast("Phone updated!");}).catch(function(e){toast("Error: "+e.message,false);});
  },
  saveGmail:function(email,sid){
    var v=document.getElementById("gm-"+sid);
    if(!v)return;
    var mem=S.mems.find(function(m){return m.email===email;});
    if(!mem)return;
    db.collection("members").doc(mem.docId||mem.id).update({gmail:v.value.trim()})
      .then(function(){toast("Gmail updated!");}).catch(function(e){toast("Error: "+e.message,false);});
  },
  saveAddr:function(email,sid){
    var v=document.getElementById("ad-"+sid);
    if(!v)return;
    var mem=S.mems.find(function(m){return m.email===email;});
    if(!mem)return;
    db.collection("members").doc(mem.docId||mem.id).update({address:v.value.trim()})
      .then(function(){toast("Address updated!");}).catch(function(e){toast("Error: "+e.message,false);});
  },
  saveTitle:function(email,sid,docId){
    var v=document.getElementById("tl-"+sid);
    if(!v)return;
    var mem=S.mems.find(function(m){return m.email===email;});
    if(!mem)return;
    var title=v.value==="— No Title —"?"":v.value;
    db.collection("members").doc(mem.docId||mem.id).update({title:title})
      .then(function(){toast("Title updated!");}).catch(function(e){toast("Error: "+e.message,false);});
  },
  changeRole:function(email,nr){
    var mem=S.mems.find(function(m){return m.email===email;});
    var isSelf=email===S.email;
    var rn={admin:"Admin",manager:"Manager",member:"Member"};
    var msg="Change "+(mem?mem.name:email)+" to "+rn[nr]+"?";
    if(isSelf&&nr!=="admin") msg="WARNING: You are removing your own Admin role!\n\nYou will lose admin access immediately.\n\nAre you absolutely sure?";
    if(!confirm(msg))return;
    AUTH[email].role=nr;
    // Persist role changes in localStorage so they survive page refresh
    try{ localStorage.setItem("sipr_roles", JSON.stringify(
      Object.keys(AUTH).reduce(function(obj,k){obj[k]=AUTH[k].role;return obj;},{})
    )); } catch(e){}
    if(isSelf){S.role=nr;A.labels();toast("Your role is now "+rn[nr]+". Some features may change.");A.buildNav();A.go("dashboard");}
    else{toast((mem?mem.name:email)+" is now "+rn[nr]+"!");A.render("users");}
  },

  // ═══════════════════════════════════
  // TX / INV MODALS
  // ═══════════════════════════════════
  openTx:function(id, forceType){
    var tx=id?S.txs.find(function(t){return t.id===id;}):null;
    var f=tx||{type:forceType||"deposit",amount:"",member:S.mems[0]?S.mems[0].name:"",note:"",date:new Date().toISOString().slice(0,10)};
    A._tt=f.type;
    var tb="";
    Object.keys(TC).forEach(function(k){
      var v=TC[k],on=k===f.type;
      tb+="<button id='tt-"+k+"' onclick='A._stt(\""+k+"\")' style='padding:10px 4px;border-radius:10px;cursor:pointer;border:"+(on?"2px solid "+v.C:"1px solid var(--bor)")+";background:"+(on?v.B:"var(--sur2)")+";color:"+(on?v.C:"var(--mut)")+";font-weight:700;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s'>";
      tb+="<span style='font-size:18px'>"+v.I+"</span>"+v.L+"</button>";
    });
    var mo=S.mems.map(function(m){return "<option"+(m.name===f.member?" selected":"")+">"+m.name+"</option>";}).join("")+"<option value='SIPR Group'"+(f.member==="SIPR Group"?" selected":"")+">SIPR Group</option>";
    var h="<div class='movl' id='tx-ov' onclick='if(event.target.id===\"tx-ov\")A.closeM()'><div class='mbox'>";
    h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:22px'><b style='font-size:17px;font-weight:800'>"+(id?"Edit":"New")+" Transaction</b><button onclick='A.closeM()' style='background:none;border:none;color:var(--mut);font-size:30px;cursor:pointer;line-height:1'>&#215;</button></div>";
    h+="<div class='fc' style='gap:16px'>";
    h+="<div><label class='lbl'>Transaction Type</label><div class='g4'>"+tb+"</div></div>";
    h+="<div class='g2'><div><label class='lbl'>Amount (BDT)</label><input type='number' id='tx-a' class='inp' placeholder='500' value='"+f.amount+"'/></div><div><label class='lbl'>Date</label><input type='date' id='tx-d' class='inp' value='"+f.date+"'/></div></div>";
    h+="<div><label class='lbl'>Member</label><select id='tx-m' class='inp'>"+mo+"</select></div>";
    h+="<div><label class='lbl'>Note / Description</label><input type='text' id='tx-n' class='inp' placeholder='e.g. Monthly contribution March 2026' value='"+(f.note||"")+"'/></div>";
    h+="<div style='display:flex;gap:10px;margin-top:6px'><button onclick='A.saveTx(\""+( id||"")+"\")' class='bp' style='flex:1;padding:14px;font-size:14px'>"+(id?"Update Record":"Save Record")+"</button><button onclick='A.closeM()' class='bs' style='flex:1;padding:14px'>Cancel</button></div>";
    h+="</div></div></div>";
    document.getElementById("modal-wrap").innerHTML=h;
  },
  _stt:function(k){
    A._tt=k;
    Object.keys(TC).forEach(function(t){
      var b=document.getElementById("tt-"+t); if(!b)return;
      var v=TC[t],on=t===k;
      b.style.border=on?"2px solid "+v.C:"1px solid var(--bor)";
      b.style.background=on?v.B:"var(--sur2)"; b.style.color=on?v.C:"var(--mut)";
    });
  },
  saveTx:function(id){
    var amt=Number(document.getElementById("tx-a").value);
    if(!amt||amt<=0){toast("Enter a valid amount.",false);return;}
    var selName=document.getElementById("tx-m").value;
    var memObj=S.mems.find(function(m){return m.name===selName;});
    var memberUID=memObj?memObj.id:"";
    var data={
      type:A._tt||"deposit",amount:amt,
      member:selName,          // keep for display fallback
      memberUID:memberUID,     // PERMANENT — never changes
      note:document.getElementById("tx-n").value,
      date:document.getElementById("tx-d").value
    };
    var p=(id&&id!=="null"&&id!=="")?db.collection("transactions").doc(id).update(data):db.collection("transactions").add(Object.assign({},data,{createdAt:firebase.firestore.FieldValue.serverTimestamp()}));
    p.then(function(){toast(id?"Record updated!":"Record added!");A.closeM();}).catch(function(e){toast("Error: "+e.message,false);});
  },
  delTx:function(id){
    if(!confirm("Delete this record? This cannot be undone."))return;
    db.collection("transactions").doc(id).delete().then(function(){toast("Deleted.");}).catch(function(){toast("Error.",false);});
  },

  openInv:function(id){
    var inv=id?S.invs.find(function(i){return i.id===id;}):null;
    var f=inv||{name:"",sector:"Plastic Recycling",amount:"",date:new Date().toISOString().slice(0,10),expectedReturn:"",actualReturn:"",status:"active",note:"",partner:""};
    var so=Object.keys(IS).map(function(k){return "<option value='"+k+"'"+(k===f.status?" selected":"")+">"+IS[k].L+"</option>";}).join("");
    var h="<div class='movl' id='iv-ov' onclick='if(event.target.id===\"iv-ov\")A.closeM()'><div class='mbox'>";

    h+="<div class='fc' style='gap:16px'>";
    h+="<div><label class='lbl'>Project Name</label><input type='text' id='iv-n' class='inp' placeholder='e.g. Plastic Bottle Collection Batch 2' value='"+f.name+"'/></div>";
    h+="<div class='g2'><div><label class='lbl'>Sector</label><select id='iv-sc' class='inp'><option"+(f.sector==="Plastic Recycling"?" selected":"")+">Plastic Recycling</option><option"+(f.sector==="Collection & Trading"?" selected":"")+">Collection &amp; Trading</option><option"+(f.sector==="Manufacturing"?" selected":"")+">Manufacturing</option><option"+(f.sector==="Operations"?" selected":"")+">Operations</option><option"+(f.sector==="Other"?" selected":"")+">Other</option></select></div><div><label class='lbl'>Date</label><input type='date' id='iv-d' class='inp' value='"+f.date+"'/></div></div>";
    h+="<div class='g2'><div><label class='lbl'>Amount Invested (BDT)</label><input type='number' id='iv-a' class='inp' placeholder='3000' value='"+f.amount+"'/></div><div><label class='lbl'>Expected Return (BDT)</label><input type='number' id='iv-e' class='inp' placeholder='3600' value='"+f.expectedReturn+"'/></div></div>";
    h+="<div class='g2'><div><label class='lbl'>Actual Return (BDT)</label><input type='number' id='iv-ac' class='inp' placeholder='0' value='"+f.actualReturn+"'/></div><div><label class='lbl'>Status</label><select id='iv-st' class='inp'>"+so+"</select></div></div>";
    h+="<div><label class='lbl'>Partner / Buyer</label><input type='text' id='iv-p' class='inp' placeholder='e.g. Narayanganj Factory' value='"+(f.partner||"")+"'/></div>";
    h+="<div><label class='lbl'>Notes</label><textarea id='iv-nt' class='inp' style='height:80px;resize:vertical' placeholder='Details about this investment...'>"+(f.note||"")+"</textarea></div>";
    h+="<div style='display:flex;gap:10px;margin-top:6px'><button onclick='A.saveInv(\""+( id||"")+"\")' class='bp' style='flex:1;padding:14px;font-size:14px'>"+(id?"Update":"Save Investment")+"</button><button onclick='A.closeM()' class='bs' style='flex:1;padding:14px'>Cancel</button></div>";
    h+="</div></div></div>";
    document.getElementById("modal-wrap").innerHTML=h;
  },
  saveInv:function(id){
    var n=document.getElementById("iv-n").value,a=Number(document.getElementById("iv-a").value);
    if(!n||!a||a<=0){toast("Fill in name and amount.",false);return;}
    var data={name:n,amount:a,sector:document.getElementById("iv-sc").value,date:document.getElementById("iv-d").value,expectedReturn:Number(document.getElementById("iv-e").value)||0,actualReturn:Number(document.getElementById("iv-ac").value)||0,status:document.getElementById("iv-st").value,partner:document.getElementById("iv-p").value,note:document.getElementById("iv-nt").value};
    var p=(id&&id!=="null"&&id!=="")?db.collection("investments").doc(id).update(data):db.collection("investments").add(Object.assign({},data,{createdAt:firebase.firestore.FieldValue.serverTimestamp()}));
    p.then(function(){toast(id?"Updated!":"Investment added!");A.closeM();}).catch(function(e){toast("Error: "+e.message,false);});
  },
  delInv:function(id){
    if(!confirm("Delete this investment?"))return;
    db.collection("investments").doc(id).delete().then(function(){toast("Deleted.");}).catch(function(){toast("Error.",false);});
  },
  closeM:function(){document.getElementById("modal-wrap").innerHTML="";},
