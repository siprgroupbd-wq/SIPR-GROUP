<style>
:root{
  --bg:#07090f;--sur:#0e1118;--sur2:#13161e;--bor:#1c2030;
  --txt:#e6e9f0;--mut:#56607a;--dim:#22283a;
  --grn:#4f8ef7;--gdm:#0a1226;--gbr:#0d1f4a;--grn2:#3a7aed;
  --blue:#4f8ef7;--purple:#8b5cf6;--gold:#f59e0b;--red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}
#login-page{display:none;min-height:100vh;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%,#0d1f4a 0%,var(--bg) 60%);}
#app-page{display:none;min-height:100vh;}
.lbox{background:var(--sur);border:1px solid var(--bor);border-radius:22px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 32px 80px #00000060;}
.lbl{display:block;font-size:10px;letter-spacing:2px;color:var(--mut);font-weight:700;margin-bottom:7px;}
.inp{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:10px;padding:12px 14px;color:var(--txt);font-size:14px;font-family:inherit;outline:none;transition:border .2s;}
.inp:focus{border-color:var(--grn);}
select.inp{cursor:pointer;}
textarea.inp{resize:vertical;}
.bp{background:linear-gradient(135deg,var(--gbr),var(--grn));color:#fff;border:none;border-radius:11px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.ba{background:var(--gdm);color:var(--grn);border:1px solid var(--gbr);border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.bs{background:var(--sur2);color:var(--txt);border:1px solid var(--bor);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.bd{background:#1a040688;color:#ef4444;border:1px solid #7f1d1d44;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:16px;padding:20px;}
.sc{background:var(--sur2);border:1px solid var(--bor);border-radius:14px;padding:16px;}
.hero{background:linear-gradient(135deg,var(--gdm),#0d1424);border:1px solid var(--gbr);border-radius:18px;padding:28px 32px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:640px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:repeat(2,1fr);}.rsp{grid-template-columns:1fr!important;}}
.fc{display:flex;flex-direction:column;gap:16px;}
.tab-row{display:flex;gap:6px;flex-wrap:wrap;}
.tab-btn{background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;color:var(--mut);font-family:inherit;}
.tab-btn.on{background:var(--gdm);border-color:var(--gbr);color:var(--grn);}
.bdg{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;}
.pbar{height:6px;background:var(--sur2);border-radius:99px;overflow:hidden;}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gbr),var(--grn));transition:width .8s ease;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:10px 14px;text-align:left;font-size:10px;letter-spacing:1.5px;color:var(--mut);font-weight:700;border-bottom:1px solid var(--bor);}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bor);font-size:13px;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tfoot td{padding:12px 14px;font-weight:700;border-top:2px solid var(--bor);border-bottom:none;}
.sheet-wrap{overflow-x:auto;}
.sheet{width:100%;border-collapse:collapse;font-size:13px;}
.sheet th{padding:12px 16px;text-align:left;font-size:10px;letter-spacing:1.5px;color:var(--mut);font-weight:700;border-bottom:1px solid var(--bor);white-space:nowrap;position:sticky;top:0;background:var(--sur);}
.sheet td{padding:13px 16px;border-bottom:1px solid var(--bor);white-space:nowrap;transition:background .3s,color .3s;}
.sheet tbody tr.row-paid:hover{background:rgba(79,142,247,.05);}
.sheet tbody tr.row-pending{background:rgba(239,68,68,.06);animation:rowPulse 3s ease-in-out infinite;}
.sheet tbody tr.row-pending td{color:#f87171;}
.sheet tbody tr.row-overdue{background:rgba(239,68,68,.12);animation:rowPulse 2s ease-in-out infinite;}
.sheet tbody tr.row-overdue td{color:#ef4444;}
@keyframes rowPulse{0%,100%{background:rgba(239,68,68,.06)}50%{background:rgba(239,68,68,.14)}}
.cell-paid{text-align:center;color:var(--grn);font-weight:700;}
.cell-unpaid{text-align:center;color:#ef4444;font-weight:700;}
.nbtn{background:none;border:none;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--mut);border-radius:8px;font-family:inherit;}
.nbtn.on{background:var(--gdm);color:var(--grn);}
/* Sidebar */
#desk-wrap{display:flex;min-height:100vh;}
#desk-nav{width:220px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column;padding:20px 12px;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:100;}
#desk-content{margin-left:220px;flex:1;padding:24px 28px;max-width:960px;}
#desk-nav .nav-logo{text-align:center;padding:12px 0 20px;border-bottom:1px solid var(--bor);margin-bottom:12px;}
#desk-nav .nav-logo .lg{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--gbr),var(--grn));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;margin:0 auto 8px;}
#desk-nav .nav-logo p{font-size:9px;letter-spacing:2px;color:var(--mut);font-weight:700;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--mut);margin-bottom:2px;transition:all .15s;}
.nav-item:hover{background:var(--sur2);color:var(--txt);}
.nav-item.on{background:var(--gdm);color:var(--grn);}
.nav-item .ni{width:18px;text-align:center;font-size:14px;}
#top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
#top-bar h2{font-size:20px;font-weight:900;letter-spacing:-0.5px;}
@media(max-width:820px){
  #desk-nav{display:none;}
  #desk-content{margin-left:0;padding:16px 16px 80px;}
  #bot-nav{display:flex!important;position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bor);z-index:100;padding:6px 0 8px;}
  #top-bar{margin-bottom:14px;}
}
#bot-nav{display:none;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;color:var(--mut);font-size:9px;font-weight:700;border:none;background:none;font-family:inherit;}
.bn-item.on{color:var(--grn);}
.bn-item .bi{font-size:18px;}
#toast{display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;align-items:center;gap:8px;white-space:nowrap;box-shadow:0 8px 32px #00000060;}
#modal-wrap .modal-bg{position:fixed;inset:0;background:#00000080;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
#modal-wrap .modal-box{background:var(--sur);border:1px solid var(--bor);border-radius:20px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite;margin-right:6px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes congratPop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
#prof-drop{display:none;position:absolute;top:44px;right:0;background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:8px;min-width:200px;z-index:200;box-shadow:0 16px 48px #00000080;}
/* Project cards */
.proj-card{background:var(--sur);border:1px solid var(--bor);border-radius:18px;overflow:hidden;transition:border-color .2s;}
.proj-card:hover{border-color:var(--gbr);}
.proj-header{padding:20px 22px;border-bottom:1px solid var(--bor);}
.proj-body{padding:20px 22px;}
.milestone-step{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--bor);}
.milestone-step:last-child{border-bottom:none;}
.ms-dot{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-top:1px;}
/* Control panel profile card */
.prof-card{background:var(--sur);border:1px solid var(--bor);border-radius:18px;overflow:hidden;margin-bottom:16px;}
.prof-card-header{padding:20px 22px;background:var(--sur2);border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:14px;}
.prof-card-body{padding:20px 22px;}
/* Congrats modal */
.congrats-modal{animation:congratPop .4s ease both;}
</style>
</head>

      var tx=S.txs.filter(function(t){return txMatch(t,mb)&&t.type==="deposit"&&new Date(t.date).getFullYear()===y&&new Date(t.date).getMonth()===m;});
      var paid=tx.length>0,paidAmt=paid?tx.reduce(function(s,t){return s+Number(t.amount);},0):0;
      var paidDate=paid?tx.sort(function(a,b){return new Date(a.date)-new Date(b.date);})[0].date:null;

      r.readAsDataURL(fl);

      doSave("","link");

      h+="</tbody><tfoot><tr><td style='padding:13px 16px;font-weight:900'>TOTAL</td><td style='padding:13px 16px;color:var(--grn);font-weight:900'>"+fmt(s.d)+"</td><td style='padding:13px 16px;color:var(--gold);font-weight:900'>"+fmt(s.i)+"</td><td style='padding:13px 16px;color:var(--purple);font-weight:900'>"+fmt(s.p)+"</td><td style='padding:13px 16px;color:var(--red);font-weight:900'>"+fmt(s.e)+"</td><td style='padding:13px 16px;color:"+(s.f>=0?"var(--grn)":"var(--red)")+";font-weight:900;font-size:14px'>"+(s.f>=0?"+":"")+fmt(s.f)+"</td></tr></tfoot></table></div></div>";

  },
  exportCSV:function(){
    var rows=[["Date","Type","Member","Amount (BDT)","Note"]];
    S.txs.slice().reverse().forEach(function(t){rows.push([t.date,t.type,txName(t),t.amount,t.note||""]);});
    var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
    var blob=new Blob([csv],{type:"text/csv"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");a.href=url;a.download="SIPR_Transactions_"+new Date().toISOString().split("T")[0]+".csv";a.click();URL.revokeObjectURL(url);
    toast("CSV exported!");
  },

    S.mems.forEach(function(m){var ta=TITLE_ACCESS[m.title]||TITLE_ACCESS["Research Officer"];h+="<div style='background:var(--sur2);border-radius:12px;padding:14px;text-align:center;border:1px solid var(--bor)'>"+av(m.name,44).replace("'display:","'margin:0 auto;display:")+"<div style='font-weight:700;font-size:13px;margin-top:8px'>"+m.name+"</div><div style='font-size:10px;color:"+ta.c+";margin-top:3px;font-weight:600'>"+m.title+"</div></div>";});

  // ════════════════════════════════════════
  // ── CONTROL PANEL (redesigned) ──
  // ════════════════════════════════════════
  pControl:function(){
    var RC={admin:{L:"Admin",C:"var(--red)"},manager:{L:"Manager",C:"var(--gold)"},member:{L:"Member",C:"var(--grn)"}};
    var h="<div class='fc'><div><h2 style='font-weight:800;font-size:22px'>Control Panel</h2><p style='font-size:13px;color:var(--mut);margin-top:4px'>Manage member profiles, titles and platform roles.</p></div>";

    // Title permissions reference card
    h+="<div class='card'><div style='font-size:11px;letter-spacing:2px;color:var(--mut);font-weight:700;margin-bottom:16px'>🔒 TITLE ACCESS MAP</div>";
    h+="<div style='display:grid;grid-template-columns:"+(mob()?"1fr":"1fr 1fr")+";gap:10px'>";
    Object.keys(TITLE_ACCESS).forEach(function(t){var ta=TITLE_ACCESS[t];h+="<div style='background:var(--sur2);border-radius:12px;padding:12px 14px;border:1px solid var(--bor)'><div style='font-weight:700;font-size:13px;color:"+ta.c+";margin-bottom:8px'>"+t+"</div>";ta.p.forEach(function(p){h+="<div style='font-size:11px;color:var(--mut);display:flex;gap:6px;margin-bottom:3px'><span style='color:"+ta.c+"'>✓</span>"+p+"</div>";});h+="</div>";});
    h+="</div></div>";

    // Reset button
    h+="<div class='card' style='border-color:var(--gold)22'><div style='display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px'><div><div style='color:var(--gold);font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:4px'>MEMBER DATA RESET</div><div style='color:var(--mut);font-size:12px'>Restore all members to default. Transactions are NOT deleted.</div></div><button onclick='A.resetMembers()' style='padding:10px 18px;border-radius:10px;border:1px solid var(--gold);background:#1c0e00;color:var(--gold);font-weight:700;font-size:13px;cursor:pointer'>⚙ Reset Members</button></div></div>";

    // MEMBER PROFILE CARDS — single Save button per profile
    S.mems.forEach(function(m){
      var auth=AUTH[m.email]||{role:"member"},rc=RC[auth.role]||RC.member;
      var isSelf=m.email===S.email;
      var sid=(m.id||m.email).replace(/[@.\-]/g,"_");
      var ta=TITLE_ACCESS[m.title]||TITLE_ACCESS["Research Officer"];

      h+="<div class='prof-card'>";
      // Card header
      h+="<div class='prof-card-header'>";
      h+=av(m.name,48);
      h+="<div style='flex:1;min-width:0'>";
      h+="<div style='display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px'>";
      h+="<span style='font-weight:800;font-size:17px'>"+m.name+"</span>";
      if(isSelf)h+="<span class='bdg' style='background:var(--sur);border:1px solid var(--bor);color:var(--mut)'>YOU</span>";
      h+="<span class='bdg' style='background:"+rc.C+"18;color:"+rc.C+";border:1px solid "+rc.C+"30'>"+rc.L+"</span>";
      h+="</div>";
      h+="<div style='font-size:12px;color:var(--mut)'>"+m.email+"</div>";
      h+="<div style='font-size:12px;color:"+ta.c+";font-weight:600;margin-top:2px'>"+m.title+"</div>";
      h+="</div></div>";

      // Card body — all fields
      h+="<div class='prof-card-body'>";
      h+="<div style='display:grid;grid-template-columns:"+(mob()?"1fr":"1fr 1fr")+";gap:12px;margin-bottom:16px'>";
      h+="<div><label class='lbl'>Display Name</label><input type='text' id='nm-"+sid+"' class='inp' value='"+m.name+"'/></div>";
      h+="<div><label class='lbl'>Phone Number</label><input type='text' id='ph-"+sid+"' class='inp' value='"+(m.phone||"")+"' placeholder='01XXXXXXXXX'/></div>";
      h+="<div><label class='lbl'>Gmail Address</label><input type='email' id='gm-"+sid+"' class='inp' value='"+(m.gmail||"")+"' placeholder='name@gmail.com'/></div>";
      h+="<div><label class='lbl'>Address</label><input type='text' id='ad-"+sid+"' class='inp' value='"+(m.address||"")+"' placeholder='City, Bangladesh'/></div>";
      h+="</div>";

      // Title selector
      h+="<div style='margin-bottom:16px'>";
      h+="<label class='lbl'>Org Title"+(m.locked?" 🔒":"")+"</label>";
      if(m.locked){
        h+="<div class='inp' style='color:var(--mut);opacity:.7;cursor:not-allowed'>"+m.title+"</div>";
      } else {
        h+="<select id='tl-"+sid+"' class='inp' onchange='A.showTitlePerms(\""+sid+"\",this.value)'>";
        Object.keys(TITLE_ACCESS).forEach(function(t){h+="<option"+(t===m.title?" selected":"")+">"+t+"</option>";});
        h+="</select>";
      }
      h+="<div id='tp-"+sid+"' style='margin-top:8px;background:var(--sur2);border-radius:10px;padding:10px 14px;border:1px solid var(--bor)'>";
      h+="<div style='font-size:9px;letter-spacing:1px;color:var(--mut);font-weight:700;margin-bottom:6px'>PERMISSIONS FOR THIS TITLE</div>";
      h+="<div style='display:flex;flex-wrap:wrap;gap:5px'>";
      ta.p.forEach(function(pp){h+="<span style='background:"+ta.c+"15;color:"+ta.c+";border:1px solid "+ta.c+"30;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600'>✓ "+pp+"</span>";});

      // Platform role assignment
      h+="<div style='margin-bottom:20px;background:var(--sur2);border-radius:12px;padding:14px;border:1px solid var(--bor)'>";
      h+="<div style='font-size:10px;letter-spacing:1.5px;color:var(--mut);font-weight:700;margin-bottom:10px'>PLATFORM ROLE</div>";

      Object.keys(RC).forEach(function(k){

      });
      h+="</div></div>";

      // SINGLE save button
      h+="<button onclick='A.saveMem(\""+m.email+"\",\""+sid+"\","+(m.locked?"true":"false")+")' class='bp' style='width:100%;padding:13px;font-size:14px'>💾 Save Profile</button>";
      h+="</div></div>"; // end prof-card
    });
    h+="</div>";return h;
  },
  showTitlePerms:function(sid,title){
    var el=$("tp-"+sid);if(!el)return;
    var ta=TITLE_ACCESS[title]||{c:"var(--mut)",p:["Basic member access"]};
    var h="<div style='font-size:9px;letter-spacing:1px;color:var(--mut);font-weight:700;margin-bottom:6px'>PERMISSIONS FOR THIS TITLE</div><div style='display:flex;flex-wrap:wrap;gap:5px'>";
    ta.p.forEach(function(pp){h+="<span style='background:"+ta.c+"15;color:"+ta.c+";border:1px solid "+ta.c+"30;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600'>✓ "+pp+"</span>";});
    h+="</div>";
    el.innerHTML=h;
  },
  saveMem:function(email,sid,locked){
    var nm=($("nm-"+sid)||{value:""}).value.trim();
    var ph=($("ph-"+sid)||{value:""}).value.trim();
    var gm=($("gm-"+sid)||{value:""}).value.trim();
    var ad=($("ad-"+sid)||{value:""}).value.trim();
    var tl=($("tl-"+sid)||{value:""}).value;
    if(!nm){toast("Name cannot be empty",false);return;}
    var upd={name:nm,phone:ph,gmail:gm,address:ad,_registered:true};
    if(!locked&&tl)upd.title=tl;
    var mem=S.mems.find(function(m){return m.email===email;});
    if(!mem){toast("Member not found",false);return;}
    db.collection("members").doc(mem.id).update(upd).then(function(){
      Object.assign(mem,upd);
      if(email===S.email){S.name=nm;A.labels();}
      A.logAct("save_member",nm);
      toast("Profile saved — "+nm+"!");
      A.render("control");
    }).catch(function(){
      db.collection("members").doc(mem.id).set(Object.assign({},mem,upd)).then(function(){
        Object.assign(mem,upd);
        if(email===S.email){S.name=nm;A.labels();}
        toast("Profile saved!");
        A.render("control");
      }).catch(function(e){toast("Error: "+e.message,false);});
    });
  },
  changeRole:function(email,nr){
    var mem=S.mems.find(function(m){return m.email===email;});
    var rn={admin:"Admin",manager:"Manager",member:"Member"};
    var msg="Change "+(mem?mem.name:email)+" to "+rn[nr]+"?";
    if(email===S.email&&nr!=="admin")msg="⚠ WARNING: You will lose your Admin access!\n\nAre you absolutely sure?";
    if(!confirm(msg))return;
    AUTH[email].role=nr;
    try{localStorage.setItem("sipr_roles",JSON.stringify(Object.keys(AUTH).reduce(function(obj,k){obj[k]=AUTH[k].role;return obj;},{})));}catch(e){}
    // Write congratulation notification to Firestore
    if(email!==S.email&&mem){
      var title=mem.title||"Member";
      var ta=TITLE_ACCESS[title]||TITLE_ACCESS["Research Officer"];
      var notif={
        message:"You have been assigned the role of <strong>"+rn[nr]+"</strong> and the title of <strong>"+title+"</strong> in SIPR Group by "+S.name+".\n\nWith your new access, you can now:\n"+ta.p.map(function(p){return "• "+p;}).join("\n"),
        assignedBy:S.name,
        assignedAt:new Date().toISOString(),
        newRole:nr,
        newTitle:title
      };
      db.collection("members").doc(mem.id).update({_roleNotif:notif}).catch(function(){});
    }
    if(email===S.email){S.role=nr;A.labels();A.buildNav();A.go("dashboard");}
    else{toast((mem?mem.name:email)+" is now "+rn[nr]+"! They will see a notification on next login.");A.render("control");}
    A.logAct("change_role",(mem?mem.name:email)+" → "+rn[nr]);
  },
  resetMembers:function(){
    if(!confirm("Reset all member data to defaults? This cannot be undone."))return;
    var batch=db.batch();
    DEFAULT_MEMBERS.forEach(function(m){batch.set(db.collection("members").doc(m.id),m);});
    batch.commit().then(function(){S.mems=DEFAULT_MEMBERS.slice();A.render("control");A.logAct("reset_members","All members reset to defaults");toast("Members reset to defaults!");}).catch(function(e){toast("Error: "+e.message,false);});
  },
  regModal:function(m){
    var sid=(m.id||m.email).replace(/[@.\-]/g,"_");
    var h="<div class='modal-bg'><div class='modal-box'>";
    h+="<div style='font-weight:800;font-size:20px;margin-bottom:6px'>Welcome to SIPR, "+m.name+"!</div>";
    h+="<div style='font-size:13px;color:var(--mut);margin-bottom:22px'>Please complete your profile to get started.</div>";
    h+="<div style='display:flex;flex-direction:column;gap:14px'>";
    h+="<div><label class='lbl'>Phone Number</label><input type='tel' id='rg-ph' class='inp' placeholder='01XXXXXXXXX'/></div>";
    h+="<div><label class='lbl'>Gmail Address</label><input type='email' id='rg-gm' class='inp' placeholder='yourname@gmail.com'/></div>";
    h+="<div><label class='lbl'>Address</label><input type='text' id='rg-ad' class='inp' placeholder='City, Bangladesh'/></div>";
    h+="<button onclick='A.saveReg(\""+m.email+"\")' class='bp' style='width:100%;padding:13px'>Complete Registration</button>";
    h+="</div></div></div>";
    $("modal-wrap").innerHTML=h;
  },
  saveReg:function(email){
    var ph=($("rg-ph")||{value:""}).value.trim(),gm=($("rg-gm")||{value:""}).value.trim(),ad=($("rg-ad")||{value:""}).value.trim();
    if(!ph){toast("Phone number required",false);return;}
    var mem=S.mems.find(function(m){return m.email===email;});
    if(!mem){A.closeM();return;}
    db.collection("members").doc(mem.id).update({phone:ph,gmail:gm,address:ad,_registered:true}).then(function(){Object.assign(mem,{phone:ph,gmail:gm,address:ad,_registered:true});A.closeM();toast("Welcome to SIPR!");}).catch(function(e){toast("Error: "+e.message,false);});
  },
  closeM:function(){var mw=$("modal-wrap");if(mw)mw.innerHTML="";}
};

});

// Show login on load
(function(){var lp=$("login-page");if(lp)lp.style.display="flex";})();
