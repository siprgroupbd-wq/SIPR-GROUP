<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>SIPR Group — Private Platform</title>
<meta name="theme-color" content="#10b981"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="robots" content="noindex,nofollow"/>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a12;--sur:#0d1424;--sur2:#111b2e;--bor:#1e2d45;
  --txt:#f0f4ff;--mut:#5a7090;--dim:#2a3a52;
  --grn:#00e5a0;--gdm:#001f14;--gbr:#003d28;
  --grn2:#00b87a;--blue:#3b82f6;--purple:#8b5cf6;
  --gold:#f59e0b;--red:#ef4444;
}
html,body{background:var(--bg);color:var(--txt);font-family:"Inter",system-ui,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:"Inter",system-ui,sans-serif}
input::placeholder,textarea::placeholder{color:var(--dim)}
select option{background:var(--sur)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bor);border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

.page{display:none}.page.on{display:flex}
#login-page{min-height:100vh;background:radial-gradient(ellipse at 30% 20%,#0d2235,var(--bg) 60%),radial-gradient(ellipse at 80% 80%,#0d1f0d,transparent 50%);align-items:center;justify-content:center;padding:20px}
#app-page{min-height:100vh;flex-direction:column}
#app-layout{display:flex;flex:1;min-height:0}

#sidebar{width:240px;background:var(--sur);border-right:1px solid var(--bor);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;padding:0 12px;flex-shrink:0;overflow-y:auto}
.nbtn{width:100%;padding:10px 12px;border-radius:10px;border:none;background:transparent;color:var(--mut);font-weight:500;font-size:13px;display:flex;align-items:center;gap:10px;margin-bottom:2px;text-align:left;border-left:3px solid transparent;cursor:pointer;transition:all .15s}
.nbtn:hover{background:var(--sur2);color:var(--txt)}
.nbtn.on{background:linear-gradient(135deg,var(--gdm),#001a2e);color:var(--grn);font-weight:700;border-left-color:var(--grn)}
.nbtn .nic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--sur2);flex-shrink:0}
.nbtn.on .nic{background:var(--gdm)}

#main-col{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{background:var(--sur);border-bottom:1px solid var(--bor);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50;flex-shrink:0}
#page-body{flex:1;overflow-y:auto;padding:28px 32px}

#mob-bar{display:none;background:var(--sur);border-bottom:1px solid var(--bor);height:56px;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:50;flex-shrink:0}
#bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bor);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
#drawer-bg{display:none;position:fixed;inset:0;background:#000b;z-index:200}
#drawer{display:none;position:fixed;left:0;top:0;bottom:0;width:260px;z-index:201;background:var(--sur);border-right:1px solid var(--bor);overflow-y:auto;padding:0 12px}

#prof-drop{display:none;position:fixed;top:62px;right:20px;background:var(--sur);border:1px solid var(--bor);border-radius:16px;padding:8px;width:240px;box-shadow:0 20px 60px #000b;z-index:500;animation:fadeUp .15s}
.pmitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .15s;border:none;background:transparent;width:100%;text-align:left;color:var(--txt);font-size:13px}
.pmitem:hover{background:var(--sur2)}

.card{background:var(--sur);border:1px solid var(--bor);border-radius:18px;padding:20px}
.csm{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:14px 16px}
.hero{background:linear-gradient(135deg,#001f14,#001428 50%,#060a12);border:1px solid #00e5a015;border-radius:22px;padding:32px 28px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,#00e5a008,transparent 70%)}
.sc{border-radius:18px;padding:20px;position:relative;overflow:hidden;border:1px solid var(--bor)}

.inp{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--bor);background:var(--sur2);color:var(--txt);font-size:13px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--grn)}
.lbl{color:var(--mut);font-size:10px;letter-spacing:1.5px;margin-bottom:6px;display:block;font-weight:700;text-transform:uppercase}

.bp{padding:11px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,#003d28,#00b87a);color:#fff;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s}
.bp:hover{transform:translateY(-1px);box-shadow:0 8px 24px #00e5a030}
.bs{padding:9px 16px;border-radius:10px;border:1px solid var(--bor);background:transparent;color:var(--mut);font-weight:600;font-size:12px;cursor:pointer;transition:all .15s}
.bs:hover{border-color:var(--grn);color:var(--grn)}
.bd{padding:9px 16px;border-radius:10px;border:1px solid #7f1d1d;background:transparent;color:#f87171;font-weight:600;font-size:12px;cursor:pointer}
.ba{padding:8px 14px;border-radius:10px;border:1px solid var(--gbr);background:var(--gdm);color:var(--grn);font-weight:700;font-size:12px;cursor:pointer;transition:all .15s}
.ba:hover{background:#002a1a}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.fc{display:flex;flex-direction:column;gap:16px}

.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap}

/* ── PAYMENT SHEET ── */
.sheet-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--bor)}
.sheet{border-collapse:collapse;min-width:700px;width:100%;font-size:12px}
.sheet th{background:var(--sur2);color:var(--mut);font-size:9px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;padding:10px 12px;border:1px solid var(--bor);white-space:nowrap;position:sticky;top:0;z-index:2}
.sheet th:first-child{position:sticky;left:0;z-index:3;background:var(--sur2);min-width:140px}
.sheet td{padding:10px 12px;border:1px solid var(--bor);vertical-align:middle;white-space:nowrap}
.sheet td:first-child{position:sticky;left:0;background:var(--sur);z-index:1;font-weight:700}
.sheet tr:hover td{background:#ffffff05}
.sheet tr:hover td:first-child{background:var(--sur2)}
.cell-paid{background:#001f1480;color:var(--grn);font-weight:700;text-align:center;cursor:default}
.cell-unpaid{background:#1a040480;color:#ef4444;font-weight:600;text-align:center}
.cell-na{background:var(--sur2);color:var(--dim);text-align:center}
.sheet tfoot td{background:var(--sur2);font-weight:800;font-size:11px;border-top:2px solid var(--bor)}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:12px 16px;text-align:left;color:var(--mut);font-size:10px;letter-spacing:1.5px;font-weight:700;background:var(--sur2);text-transform:uppercase}
.tbl td{padding:13px 16px;border-top:1px solid var(--bor);vertical-align:middle}
.tbl tr:hover td{background:var(--sur2)}
.tbl thead tr th:first-child{border-radius:10px 0 0 10px}
.tbl thead tr th:last-child{border-radius:0 10px 10px 0}

/* ── MODAL ── */
.movl{position:fixed;inset:0;background:#000d;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
.mbox{background:var(--sur);border:1px solid var(--bor);border-radius:20px;padding:28px;width:100%;max-width:500px;animation:fadeUp .2s;max-height:92vh;overflow-y:auto;box-shadow:0 32px 80px #000c}

#toast{position:fixed;top:24px;right:24px;z-index:9999;display:none;align-items:center;gap:10px;padding:13px 20px;border-radius:14px;font-weight:600;font-size:13px;box-shadow:0 12px 40px #0009;max-width:320px;animation:fadeUp .2s}

.pbar{height:7px;background:var(--sur2);border-radius:99px;overflow:hidden}
.pfill{height:100%;border-radius:99px;transition:width 1s ease}
.spin{width:36px;height:36px;border:3px solid var(--bor);border-top:3px solid var(--grn);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);display:inline-block;animation:pulse 2s infinite;margin-right:6px}

/* ── CHAT ── */
.chat-user{background:var(--gdm);border:1px solid var(--gbr);border-radius:16px 16px 4px 16px;padding:11px 15px;font-size:13px;line-height:1.7;white-space:pre-wrap;max-width:82%;margin-left:auto}
.chat-ai{background:var(--sur2);border:1px solid var(--bor);border-radius:16px 16px 16px 4px;padding:11px 15px;font-size:13px;line-height:1.7;white-space:pre-wrap;max-width:82%}
.chat-row{display:flex;margin-bottom:12px;gap:10px;align-items:flex-start}
.chat-row.u{justify-content:flex-end}
.chat-av{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#05101a,#1a0f3a);border:1px solid #3b82f630;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:2px}

/* ── VOTE BAR ── */
.vbar{height:6px;background:var(--sur2);border-radius:99px;overflow:hidden;position:relative}
.vbar-y{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--gbr),var(--grn));border-radius:99px;transition:width .6s}
.vbar-n{position:absolute;right:0;top:0;bottom:0;background:#ef444460;border-radius:99px;transition:width .6s}

@media(max-width:820px){
  #sidebar{display:none!important}
  #topbar{display:none!important}
  #mob-bar{display:flex!important}
  #bot-nav{display:flex!important}
  #app-layout{flex-direction:column}
  #main-col{width:100vw;max-width:100vw}
  #page-body{padding:16px 14px 84px;overflow-x:hidden}
  .g4{grid-template-columns:1fr 1fr!important}
  .g3{grid-template-columns:1fr!important}
  .stack{grid-template-columns:1fr!important}
  .hero{padding:22px 18px}
  .movl{align-items:flex-end;padding:0}
  .mbox{border-radius:22px 22px 0 0;max-width:100%}
  #prof-drop{right:10px;width:220px}
  .g2.rsp{grid-template-columns:1fr!important}
  .chat-user,.chat-ai{max-width:90%}
}
@media(min-width:821px){.mob-only{display:none!important}}
</style>

function $(id){return document.getElementById(id);}

function fd(d){return new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});}
function fdt(d){return new Date(d).toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});}
function sumT(arr,t){return arr.filter(function(x){return x.type===t;}).reduce(function(s,x){return s+Number(x.amount);},0);}
function pct(v,mx){return Math.min(Math.round(v/mx*100),100);}
function now(){return new Date().toISOString();}

function av(name,sz){
  sz=sz||38;
  var h=(name||"?").split("").reduce(function(a,c){return a+c.charCodeAt(0);},0)%360;
  var h2=(h+50)%360;
  var ini=(name||"?").split(" ").map(function(w){return w[0]||"";}).join("").slice(0,2).toUpperCase();
  return "<div style='width:"+sz+"px;height:"+sz+"px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,hsl("+h+",50%,22%),hsl("+h2+",60%,38%));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:"+Math.round(sz*.36)+"px;border:2px solid hsl("+h+",40%,30%)'>"+ini+"</div>";
}
function avS(name){
  var h=(name||"?").split("").reduce(function(a,c){return a+c.charCodeAt(0);},0)%360;
  var ini=(name||"?").split(" ").map(function(w){return w[0]||"";}).join("").slice(0,2).toUpperCase();
  return "<div style='width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,hsl("+h+",50%,22%),hsl("+((h+50)%360)+",60%,38%));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px;border:2px solid hsl("+h+",40%,30%)'>"+ini+"</div>";
}

var _tt;
function toast(m,ok){
  ok=ok!==false;var t=$("toast");
  t.style.background=ok?"linear-gradient(135deg,#001f14,#002a1a)":"linear-gradient(135deg,#1a0404,#2a0808)";
  t.style.border="1px solid "+(ok?"var(--grn)":"#ef4444");
  t.style.color=ok?"var(--grn)":"#f87171";
  t.innerHTML="<span>"+(ok?"&#10003;":"&#10005;")+"</span> "+m;
  t.style.display="flex";
  clearTimeout(_tt);_tt=setTimeout(function(){t.style.display="none";},3500);
}

function getMem(email){return S.mems.find(function(m){return m.email===email;})||{};}
function getMyMem(){return getMem(S.email);}
function getUID(uid){return S.mems.find(function(m){return m.id===uid;})||null;}

function resolveUID(t){
  if(t.memberUID&&t.memberUID.indexOf("SIPR26")===0)return t.memberUID;
  if(t.memberUID&&OLD_UID_MAP[t.memberUID.toLowerCase()])return OLD_UID_MAP[t.memberUID.toLowerCase()];
  if(t.memberEmail){var mx=S.mems.find(function(x){return x.email===t.memberEmail;});if(mx)return mx.id;}
  if(t.member){var u=NAME_TO_UID[t.member.toLowerCase().trim()];if(u)return u;}
  return null;
}
function txMatch(t,mem){var u=resolveUID(t);if(u)return u===mem.id;return t.member===mem.name;}
function txName(t){var u=resolveUID(t);if(u){var m=getUID(u);if(m)return m.name;}return t.member||"Unknown";}

  initApp:function(){
    db.collection("members").get().then(function(snap){
      if(snap.empty){
        var b=db.batch();DEFAULT_MEMBERS.forEach(function(m){b.set(db.collection("members").doc(m.id),m);});
        b.commit().then(function(){S.mems=DEFAULT_MEMBERS.slice();A.afterMemLoad();});
      }else{
        S.mems=A._dedup(snap.docs.map(function(d){var x=d.data();if(!x.id)x.id=d.id;return Object.assign({},x,{docId:d.id});}));
        A.afterMemLoad();
      }
    }).catch(function(){S.mems=DEFAULT_MEMBERS.slice();A.afterMemLoad();});
  },

  _dedup:function(arr){
    var seen={},out=[];
    arr.forEach(function(m){
      if(!m.email)return;
      if(!seen[m.email]){seen[m.email]=true;out.push(m);}
      else{var idx=out.findIndex(function(x){return x.email===m.email;});if(idx>=0&&m.id&&m.id.indexOf("SIPR26")===0)out[idx]=m;}
    });
    return out.sort(function(a,b){return(a.id||"").localeCompare(b.id||"");});
  },

  afterMemLoad:function(){
    var me=getMem(S.email);S.name=me.name||S.email;
    A.buildNav();A.labels();A.buildAvBtn();A.migrate();
    A.logAct("Login","Signed in");
    S.u1=db.collection("transactions").orderBy("date","desc").onSnapshot(function(sn){S.txs=sn.docs.map(function(d){return Object.assign({id:d.id},d.data());});A.updateFund();A.render(S.tab);},function(e){console.error(e);toast("DB error",false);});
    S.u2=db.collection("investments").orderBy("date","desc").onSnapshot(function(sn){S.invs=sn.docs.map(function(d){return Object.assign({id:d.id},d.data());});if(S.tab==="investments"||S.tab==="dashboard")A.render(S.tab);},function(e){console.error(e);});
    S.u3=db.collection("members").onSnapshot(function(sn){S.mems=A._dedup(sn.docs.map(function(d){var x=d.data();if(!x.id)x.id=d.id;return Object.assign({},x,{docId:d.id});}));var me=getMem(S.email);S.name=me.name||S.name;A.labels();A.buildAvBtn();if(["members","users","profile"].indexOf(S.tab)>=0)A.render(S.tab);},function(e){console.error(e);});
  },

  migrate:function(){
    if(!S.mems.length)return;
    var nm={};
    S.mems.forEach(function(m){nm[m.name.toLowerCase()]=m.id;});
    Object.keys(NAME_TO_UID).forEach(function(k){nm[k]=NAME_TO_UID[k];});
    var to=S.txs.filter(function(t){return !t.memberUID||t.memberUID.indexOf("SIPR26")!==0;});

    var b=db.batch(),c=0;
    to.forEach(function(t){var u=resolveUID(t);if(u){var m=getUID(u);var upd={memberUID:u};if(m)upd.member=m.name;b.set(db.collection("transactions").doc(t.id),upd,{merge:true});c++;}});
    if(c>0)b.commit().catch(function(e){console.error(e);});
  },

  resetMembers:function(){
    if(!confirm("Reset all members to correct names?\n\nTransaction history will NOT be deleted."))return;

  openNewProp:function(){
    var h="<div class='movl' id='np-ov' onclick='if(event.target.id===\"np-ov\")A.closeM()'><div class='mbox'><div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:22px'><b style='font-size:17px;font-weight:800'>New Investment Proposal</b><button onclick='A.closeM()' style='background:none;border:none;color:var(--mut);font-size:30px;cursor:pointer;line-height:1'>&#215;</button></div><div class='fc' style='gap:14px'><div><label class='lbl'>Title</label><input type='text' id='np-t' class='inp' placeholder='e.g. Phase 1 Plastic Collection Batch 2'/></div><div><label class='lbl'>Description &amp; Expected Returns</label><textarea id='np-d' class='inp' rows='4' style='resize:vertical' placeholder='Describe the idea, expected returns, risks, timeline...'></textarea></div><div><label class='lbl'>Proposed By</label><select id='np-b' class='inp'>";
    S.mems.forEach(function(m){h+="<option value='"+m.name+"'"+(m.name===S.name?" selected":"")+">"+m.name+"</option>";});
    h+="</select></div><div><label class='lbl'>Estimated Amount (BDT) — 0 if not fixed</label><input type='number' id='np-a' class='inp' placeholder='0' value='0'/></div><div style='display:flex;gap:10px;margin-top:6px'><button onclick='A.saveProp()' class='bp' style='flex:1;padding:14px'>Submit Proposal</button><button onclick='A.closeM()' class='bs' style='flex:1;padding:14px'>Cancel</button></div></div></div></div>";

  saveProp:function(){
    var t=($("np-t")||{}).value||"",d=($("np-d")||{}).value||"",b=($("np-b")||{}).value||S.name,a=Number(($("np-a")||{}).value)||0;
    if(!t.trim()||!d.trim()){toast("Fill in title and description.",false);return;}
    db.collection("proposals").add({title:t.trim(),description:d.trim(),proposedBy:b,amount:a,date:new Date().toISOString().split("T")[0],status:"voting",votesYes:[],votesNo:[],comments:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()})
      .then(function(){toast("Proposal submitted!");A.logAct("Proposal Submitted",t.trim());A.closeM();A.loadProps();}).catch(function(e){toast("Error: "+e.message,false);});
  },

  voteProp:function(pid,v){
    var add=v==="yes"?"votesYes":"votesNo",rem=v==="yes"?"votesNo":"votesYes";
    db.collection("proposals").doc(pid).update({[add]:firebase.firestore.FieldValue.arrayUnion(S.email),[rem]:firebase.firestore.FieldValue.arrayRemove(S.email)})
      .then(function(){toast("Vote recorded — "+v.toUpperCase()+"!");A.logAct("Vote Cast",S.name+" voted "+v);A.loadProps();}).catch(function(e){toast("Error: "+e.message,false);});
  },

  finalizeProp:function(pid,status){
    if(!confirm("Mark this proposal as "+status+"?"))return;
    db.collection("proposals").doc(pid).update({status:status}).then(function(){toast("Proposal "+status+"!");A.logAct("Proposal "+status.charAt(0).toUpperCase()+status.slice(1),"Admin finalized");A.loadProps();}).catch(function(e){toast("Error: "+e.message,false);});
  },

  postComment:function(pid){
    var el=$("pd-cmt");if(!el||!el.value.trim())return;
    var c={by:S.name,text:el.value.trim(),date:now()};
    db.collection("proposals").doc(pid).update({comments:firebase.firestore.FieldValue.arrayUnion(c)}).then(function(){toast("Comment posted!");A.logAct("Comment Posted",S.name+" commented");el.value="";A.closeM();A.loadProps();}).catch(function(e){toast("Error: "+e.message,false);});
  },

  // ═══════════════ ACTIVITY LOG ═══════════════
  pActivity:function(){
    return "<div class='fc'><div><h2 style='font-weight:800;font-size:22px'>Activity Log</h2><p style='font-size:13px;color:var(--mut);margin-top:4px'>Complete audit trail of all platform actions.</p></div><div id='act-filters' style='display:flex;gap:8px;flex-wrap:wrap'></div><div id='act-list'><div style='text-align:center;padding:40px'><div class='spin'></div><div style='color:var(--mut);font-size:13px;margin-top:14px'>Loading activity...</div></div></div></div>";
  },

  _actF:"all",

  loadActivity:function(){

      var acts=sn.docs.map(function(d){return Object.assign({id:d.id},d.data());});

    el.innerHTML=h;
  },

  renderActList:function(acts){

    h+="<div><label class='lbl'>Partner / Buyer</label><input type='text' id='iv-p' class='inp' value='"+(f.partner||"")+"' placeholder='e.g. Narayanganj Factory'/></div>";
    h+="<div><label class='lbl'>Notes</label><textarea id='iv-nt' class='inp' style='height:80px;resize:vertical'>"+(f.note||"")+"</textarea></div>";
    h+="<div style='display:flex;gap:10px'><button onclick='A.saveInv(\""+( id||"")+"\")' class='bp' style='flex:1;padding:14px'>"+(id?"Update":"Save Investment")+"</button><button onclick='A.closeM()' class='bs' style='flex:1;padding:14px'>Cancel</button></div></div></div></div>";
    document.getElementById("modal-wrap").innerHTML=h;
  },
  saveInv:function(id){
    var n=($("iv-n")||{}).value||"",a=Number(($("iv-a")||{}).value);
    if(!n||!a||a<=0){toast("Fill in name and amount.",false);return;}
    var data={name:n,amount:a,sector:($("iv-sc")||{}).value||"",date:($("iv-d")||{}).value||"",expectedReturn:Number(($("iv-e")||{}).value)||0,actualReturn:Number(($("iv-ac")||{}).value)||0,status:($("iv-st")||{}).value||"active",partner:($("iv-p")||{}).value||"",note:($("iv-nt")||{}).value||""};
    var p=(id&&id!=="null"&&id!=="")?db.collection("investments").doc(id).update(data):db.collection("investments").add(Object.assign({},data,{createdAt:firebase.firestore.FieldValue.serverTimestamp()}));
    p.then(function(){toast(id?"Updated!":"Investment added!");A.logAct("Investment Added",n);A.closeM();}).catch(function(e){toast("Error: "+e.message,false);});
  },
  delInv:function(id){if(!confirm("Delete this investment?"))return;db.collection("investments").doc(id).delete().then(function(){toast("Deleted.");}).catch(function(){toast("Error.",false);});},
  exportCSV:function(){
    var rows=[["Date","Type","Member","Amount (BDT)","Note"]];
    S.txs.slice().reverse().forEach(function(t){rows.push([t.date,t.type,txName(t),t.amount,t.note||""]);});
    var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
    var blob=new Blob([csv],{type:"text/csv"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");a.href=url;a.download="SIPR_Transactions_"+new Date().toISOString().split("T")[0]+".csv";a.click();
    URL.revokeObjectURL(url);toast("CSV exported!");
  },
  closeM:function(){document.getElementById("modal-wrap").innerHTML=""; },

  // ═══════════════ WHATSAPP / EMAIL ═══════════════
  wa:function(ph,nm,m,y){
    var msg=encodeURIComponent("Assalamualaikum "+nm+" bhai!\n\nSIPR Group payment reminder:\n\nMonthly contribution of BDT "+DUE+" for "+MS[m]+" "+y+" is still pending.\n\nDeadline: 10th of each month\nbKash: 01845526909 (Shoeb - Treasurer)\n\nPlease send at your earliest convenience.\n\n— Jaziro\nPresident, SIPR Group\nInvest. Grow. Prosper.");
    window.open("https://wa.me/880"+ph.replace(/^0/,"")+"?text="+msg,"_blank");
  },
  em:function(gmail,nm,m,y){
    var s=encodeURIComponent("SIPR Group — Contribution Reminder: "+MS[m]+" "+y);
    var b=encodeURIComponent("Assalamualaikum "+nm+" bhai,\n\nMonthly contribution reminder.\n\nMonth: "+MS[m]+" "+y+"\nAmount: BDT "+DUE+"\nbKash: 01845526909 (Shoeb)\n\nJaziro — President, SIPR Group");
    window.location.href="mailto:"+gmail+"?subject="+s+"&body="+b;
  },
  bulkWa:function(){
    var up=A.payS(S.payY,S.payM).filter(function(m){return !m.paid;});
    up.forEach(function(m,i){setTimeout(function(){A.wa(m.phone,m.name,S.payM,S.payY);},i*700);});
    toast("Opened WhatsApp for "+up.length+" members");
  }
};
