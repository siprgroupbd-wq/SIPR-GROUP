<style>
:root{--bg:#07090f;--sur:#0e1118;--s2:#13161e;--bor:#1c2030;--txt:#e6e9f0;--mut:#56607a;--grn:#4f8ef7;--gdm:#0a1226;--gbr:#0d1f4a;--gold:#f59e0b;--purple:#8b5cf6;--red:#ef4444;--teal:#14b8a6;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}
.page{display:none;}
/* LOGIN */
#pg-login{min-height:100vh;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%,#0d1f4a,var(--bg));display:flex;}
.lbox{background:var(--sur);border:1px solid var(--bor);border-radius:20px;padding:36px 32px;width:100%;max-width:400px;}
.lbl{display:block;font-size:10px;letter-spacing:2px;color:var(--mut);font-weight:700;margin-bottom:6px;}
.inp{width:100%;background:var(--s2);border:1px solid var(--bor);border-radius:10px;padding:11px 13px;color:var(--txt);font-size:14px;font-family:inherit;outline:none;transition:border .15s;}
.inp:focus{border-color:var(--grn);}
select.inp{cursor:pointer;}textarea.inp{resize:vertical;}
.btn-p{width:100%;padding:13px;background:linear-gradient(135deg,var(--gbr),var(--grn));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.btn-g{width:100%;padding:12px;background:var(--s2);border:1px solid var(--bor);color:var(--txt);border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;touch-action:manipulation;}
.btn-a{background:var(--gdm);color:var(--grn);border:1px solid var(--gbr);border-radius:9px;padding:8px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.btn-s{background:var(--s2);color:var(--txt);border:1px solid var(--bor);border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.btn-d{background:#1a040688;color:#ef4444;border:1px solid #7f1d1d44;border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.divider{display:flex;align-items:center;gap:10px;color:var(--mut);font-size:11px;margin:14px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bor);}
.err{color:#f87171;font-size:12px;padding:10px 13px;background:#1a060688;border-radius:8px;border:1px solid #7f1d1d;margin-top:10px;display:none;}
/* APP */
#pg-app{display:none;min-height:100vh;}
#sidebar{width:220px;background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column;padding:16px 10px;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:100;transition:transform .25s;}
.nav-logo{text-align:center;padding:8px 0 14px;border-bottom:1px solid var(--bor);margin-bottom:10px;}
.nav-logo .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--gbr),var(--grn));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;margin:0 auto 6px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--mut);margin-bottom:1px;transition:all .15s;touch-action:manipulation;}
.nav-item:hover{background:var(--s2);color:var(--txt);}
.nav-item.active{background:var(--gdm);color:var(--grn);}
#main{margin-left:220px;flex:1;padding:20px 24px;max-width:960px;}
#topbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
#topbar h2{font-size:19px;font-weight:900;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#ham{display:none;background:var(--s2);border:1px solid var(--bor);border-radius:8px;padding:8px 11px;font-size:18px;cursor:pointer;color:var(--txt);touch-action:manipulation;}
@media(max-width:800px){
  #sidebar{transform:translateX(-220px);}
  #sidebar.open{transform:translateX(0);box-shadow:8px 0 40px #00000099;}
  #main{margin-left:0;padding:13px 13px 80px;}
  #ham{display:block;}
  #bot-nav{display:flex!important;}
  .hide-mob{display:none!important;}
}
#bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bor);z-index:100;padding:5px 0 7px;}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 3px;cursor:pointer;color:var(--mut);font-size:9px;font-weight:700;border:none;background:none;font-family:inherit;touch-action:manipulation;}
.bn.active{color:var(--grn);}
.bn .bi{font-size:18px;}
#overlay{display:none;position:fixed;inset:0;background:#00000070;z-index:99;}
/* Cards */
.card{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:18px;}
.sc{background:var(--s2);border:1px solid var(--bor);border-radius:12px;padding:14px;}
.hero{background:linear-gradient(135deg,var(--gdm),#0d1424);border:1px solid var(--gbr);border-radius:16px;padding:22px 26px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:600px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}.g2-mob{grid-template-columns:1fr!important;}}
.fc{display:flex;flex-direction:column;gap:14px;}
.tab-row{display:flex;gap:5px;flex-wrap:wrap;}
.tab{background:var(--s2);border:1px solid var(--bor);border-radius:7px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--mut);font-family:inherit;touch-action:manipulation;}
.tab.active{background:var(--gdm);border-color:var(--gbr);color:var(--grn);}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.pbar{height:5px;background:var(--s2);border-radius:99px;overflow:hidden;}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gbr),var(--grn));}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:9px 12px;text-align:left;font-size:10px;letter-spacing:1.5px;color:var(--mut);font-weight:700;border-bottom:1px solid var(--bor);}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--bor);font-size:13px;}
.tbl tr:last-child td{border-bottom:none;}
.sw{overflow-x:auto;}
.modal-bg{position:fixed;inset:0;background:#00000088;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--sur);border:1px solid var(--bor);border-radius:18px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
#prof-btn{position:relative;cursor:pointer;touch-action:manipulation;}
#prof-drop{display:none;position:absolute;top:46px;right:0;background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:10px;min-width:210px;z-index:200;box-shadow:0 16px 48px #000000aa;}
#toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 8px 24px #00000060;}
.live{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite;margin-right:5px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.pb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bor);}
.pb-row:last-child{border-bottom:none;}
/* Collection tracker */
.col-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bor);}
.col-row:last-child{border-bottom:none;}
.stat-box{background:var(--s2);border:1px solid var(--bor);border-radius:10px;padding:12px;text-align:center;}
.stat-box .val{font-size:16px;font-weight:900;margin-top:4px;}
.stat-box .lbl2{font-size:9px;color:var(--mut);font-weight:700;letter-spacing:1px;}
/* Invite page */
#pg-invite{display:none;min-height:100vh;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%,#0d1f4a,var(--bg));}
</style>
</head>

  var h=(name||"?").split("").reduce(function(a,c){return a+c.charCodeAt(0);},0)%360;
  var ini=(name||"?").split(" ").map(function(w){return w[0]||"";}).join("").slice(0,2).toUpperCase();
  return "<div style='width:"+sz+"px;height:"+sz+"px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,hsl("+h+",40%,20%),hsl("+((h+50)%360)+",50%,30%));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:"+Math.round(sz*.35)+"px'>"+ini+"</div>";
}
function txbdg(t){var c=TC[t]||TC.deposit;return "<span class='bdg' style='background:"+c.B+";color:"+c.C+";border:1px solid "+c.BD+"'>"+c.I+" "+c.L+"</span>";}
var _tt;
function toast(m,ok){ok=ok!==false;var t=$("toast");t.style.background=ok?"linear-gradient(135deg,#0a1226,#0d1f4a)":"linear-gradient(135deg,#1a0404,#2a0808)";t.style.border="1px solid "+(ok?"var(--grn)":"#ef4444");t.style.color=ok?"var(--grn)":"#f87171";t.textContent=(ok?"✓ ":"✗ ")+m;t.style.display="block";clearTimeout(_tt);_tt=setTimeout(function(){t.style.display="none";},3500);}
function getMem(email){return S.mems.find(function(m){return m.email===email;})||{};}
function resolveUID(t){if(t.memberUID&&t.memberUID.indexOf("SIPR26")===0)return t.memberUID;if(t.memberEmail){var mx=S.mems.find(function(x){return x.email===t.memberEmail;});if(mx)return mx.id;}if(t.member){var u=NAME_MAP[t.member.toLowerCase().trim()];if(u)return u;}return null;}
function txName(t){var u=resolveUID(t);if(u){var m=S.mems.find(function(x){return x.id===u;});if(m)return m.name;}return t.member||"Unknown";}
function txMatch(t,mem){var u=resolveUID(t);if(u)return u===mem.id;return t.member===mem.name;}

function gLogin(){fa.signInWithPopup(gp).catch(function(e){showErr("lerr",e.message);});}
function eLogin(){
  var em=($("em")||{value:""}).value.trim().toLowerCase();
  var pw=($("pw")||{value:""}).value;
  if(!em||!pw){showErr("lerr","Enter email and password.");return;}
  hideErr("lerr");
  fa.signInWithEmailAndPassword(em,pw).catch(function(e){
    showErr("lerr",e.code==="auth/user-not-found"?"Email not found.":e.code==="auth/wrong-password"||e.code==="auth/invalid-credential"?"Wrong password.":e.message);
  });
}
function fPass(){var em=($("em")||{value:""}).value.trim();if(!em){showErr("lerr","Enter your email first.");return;}fa.sendPasswordResetEmail(em).then(function(){toast("Reset email sent!");}).catch(function(e){showErr("lerr",e.message);});}
function showReg(){$("lf").style.display="none";$("rf").style.display="block";hideErr("lerr");}
function showLogin(){$("lf").style.display="block";$("rf").style.display="none";hideErr("lerr");}
function doReg(){
  var name=($("rn")||{value:""}).value.trim();
  var email=($("re")||{value:""}).value.trim().toLowerCase();
  var pass=($("rp")||{value:""}).value;
  var code=($("rc")||{value:""}).value.trim().toUpperCase();
  if(!name||!email||!pass||!code){showErr("lerr","All fields required.");return;}
  if(pass.length<6){showErr("lerr","Password min 6 characters.");return;}
  var mem=S.mems.find(function(m){return m.id.toUpperCase()===code;});
  if(!mem){showErr("lerr","Invalid invite code. Ask Jahed.");return;}
  fa.createUserWithEmailAndPassword(email,pass).then(function(cred){
    return db.collection("members").doc(mem.id).update({email:email,name:name,authUid:cred.user.uid,status:"pending",_registered:true,pendingAt:now()});
  }).then(function(){
    db.collection("pendingApprovals").add({memberId:mem.id,name:name,email:email,requestedAt:now(),status:"pending"}).catch(function(){});
    showLogin();hideErr("lerr");toast("Registration submitted! Wait for admin approval.");
  }).catch(function(e){showErr("lerr",e.message);});
}
function linkCode(){
  var code=($("ic")||{value:""}).value.trim().toUpperCase();
  if(!code){showErr("ierr","Enter your invite code.");return;}
  var user=fa.currentUser;if(!user){showErr("ierr","Not signed in.");return;}
  var mem=S.mems.find(function(m){return m.id.toUpperCase()===code;});
  if(!mem){showErr("ierr","Invalid code. Ask Jahed.");return;}
  // Allow re-linking if the same user tries again
  if(mem.googleUid&&mem.googleUid!==user.uid){showErr("ierr","This code is already linked to another account.");return;}
  db.collection("members").doc(mem.id).update({googleUid:user.uid,googleEmail:user.email,_registered:true}).then(function(){
    Object.assign(mem,{googleUid:user.uid,googleEmail:user.email});
    S.email=mem.email;S.name=mem.name||user.displayName;S.uid=user.uid;S.role=mem.role||"member";
    $("pg-invite").style.display="none";
    initApp();toast("Welcome to SIPR, "+S.name+"! 🎉");
  }).catch(function(e){showErr("ierr","Error: "+e.message);});
}
function doLogout(){fa.signOut().then(function(){S.email="";S.name="";S.role="member";S.uid="";S.txs=[];S.invs=[];S.mems=[];S.wallets=[];$("pg-app").style.display="none";$("pg-login").style.display="flex";$("pg-invite").style.display="none";});}
function changePwModal(){closeProf();var h="<div class='modal-bg' onclick='if(event.target===this)closeModal()'><div class='modal-box'><div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:18px'><div style='font-weight:800;font-size:17px'>Change Password</div><button onclick='closeModal()' style='background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer'>✕</button></div><div class='fc'><div><label class='lbl'>New Password</label><input type='password' id='np' class='inp' placeholder='Min 6 characters'/></div><div><label class='lbl'>Confirm</label><input type='password' id='cp2' class='inp'/></div><button class='btn-p' onclick='doCp()'>Update Password</button></div></div></div>";$("modal").innerHTML=h;}

fa.onAuthStateChanged(function(user){
  if(!user){$("pg-app").style.display="none";$("pg-login").style.display="flex";$("pg-invite").style.display="none";return;}
  loadMembers(function(){
    var mem=S.mems.find(function(m){return m.googleUid===user.uid;})||S.mems.find(function(m){return m.email===user.email;});
    if(mem){
      if(mem.status==="pending"){$("pg-login").style.display="flex";showErr("lerr","Your registration is pending admin approval.");fa.signOut();return;}
      var ADMIN_E=["jaziro@sipr.com"];
      S.email=mem.email;S.name=mem.name||user.displayName||user.email;S.uid=user.uid;
      S.role=ADMIN_E.indexOf(mem.email)>=0?"admin":(mem.role||"member");
      if(ADMIN_E.indexOf(mem.email)>=0&&mem.role!=="admin")db.collection("members").doc(mem.id).update({role:"admin"}).catch(function(){});
      // Auto-sync gmail with actual Google login email
      if(user.email&&mem.gmail!==user.email)db.collection("members").doc(mem.id).update({gmail:user.email}).catch(function(){});
      $("pg-login").style.display="none";$("pg-invite").style.display="none";
      initApp();
    } else {
      $("pg-login").style.display="none";
      var ip=$("pg-invite");ip.style.display="flex";
      var gi=$("gu-info");
      if(gi)gi.innerHTML=av(user.displayName||user.email,32)+"<div><div style='font-size:13px;font-weight:700'>"+(user.displayName||"New User")+"</div><div style='font-size:11px;color:var(--mut)'>"+user.email+"</div></div>";
    }
  });
});

// ═══════════ DATA ═══════════
function loadMembers(cb){
  db.collection("members").get().then(function(snap){
    if(snap.empty){S.mems=DEF_MEMS.slice();if(cb)cb();return;}
    var seen={};
    S.mems=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}).filter(function(m){
      if(!m.email||seen[m.email])return false;
      if(m.status==="removed"||m.status==="deleted")return false;
      seen[m.email]=true;return true;
    });
    if(cb)cb();
  }).catch(function(){S.mems=DEF_MEMS.slice();if(cb)cb();});
}
function loadTxs(){
  db.collection("transactions").orderBy("date","desc").onSnapshot(function(snap){
    S.txs=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    S.txs.forEach(function(t){if((!t.memberUID||t.memberUID.indexOf("SIPR26")<0)&&t.member){var uid=NAME_MAP[t.member.toLowerCase().trim()];if(uid)db.collection("transactions").doc(t.id).update({memberUID:uid}).catch(function(){});}});
    if(["dashboard","payments","transactions","members","expenses","wallet"].indexOf(S.tab)>=0)render();
  });
}
function loadInvs(){
  db.collection("investments").orderBy("date","desc").onSnapshot(function(snap){
    S.invs=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    if(S.tab==="dashboard"||S.tab==="investments")render();
  });
}
function loadWallets(){
  db.collection("wallets").onSnapshot(function(snap){
    S.wallets=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    updateWallet();
    if(S.tab==="wallet")render();
  });
}
function logAct(action,detail){
  var imp=["add_transaction","edit_transaction","delete_transaction","add_investment","edit_investment","delete_investment","post_announcement","submit_proposal","distribute_profit","issue_fine","save_member","change_role","reset_members","add_member","remove_member","add_collection","add_sale"];
  if(imp.indexOf(action)<0||!S.name)return;
  db.collection("activity").add({action:action,detail:detail,by:S.name,byEmail:S.email,role:S.role,ts:firebase.firestore.FieldValue.serverTimestamp(),iso:now()}).catch(function(){});
}

// ═══════════ WALLET ═══════════
function getMyWallet(){var me=getMem(S.email);if(!me||!me.id)return{available:0,locked:0,history:[]};var w=S.wallets.find(function(x){return x.memberId===me.id;})||{available:0,locked:0,history:[]};var today=new Date(),unlocked=0,locked=0;(w.history||[]).forEach(function(e){if(e.type==="salary"&&e.locked){if(e.unlockDate&&today>=new Date(e.unlockDate))unlocked+=Number(e.amount);else locked+=Number(e.amount);}});return{available:Number(w.available||0)+unlocked,locked:locked,history:w.history||[],docId:w.id};}
function getMemWallet(mid){var w=S.wallets.find(function(x){return x.memberId===mid;})||{available:0,locked:0};return{available:Number(w.available||0),locked:Number(w.locked||0)};}
function updateWallet(){var w=getMyWallet();var wi="<div style='background:var(--gdm);border:1px solid var(--gbr);border-radius:10px;padding:10px 12px'><div style='font-size:9px;color:var(--mut);font-weight:700;letter-spacing:1px;margin-bottom:4px'>MY WALLET</div><div style='font-size:16px;font-weight:900;color:var(--grn)'>"+fmt(w.available)+"</div>"+(w.locked>0?"<div style='font-size:11px;color:var(--gold);margin-top:2px'>🔒 "+fmt(w.locked)+" locked</div>":"")+"</div>";var pdw=$("pd-wallet");if(pdw)pdw.innerHTML=wi;}

// ═══════════ STATS ═══════════
function stats(){var d=sumT(S.txs,"deposit"),i=sumT(S.txs,"invest"),p=sumT(S.txs,"profit"),e=sumT(S.txs,"expense");return{d:d,i:i,p:p,e:e,f:d+p-i-e};}
function mRows(){var km={};S.txs.forEach(function(t){var d=new Date(t.date),k=DM[d.getMonth()]+" '"+String(d.getFullYear()).slice(2);if(!km[k])km[k]={lab:k,deposit:0,invest:0,profit:0,expense:0,_y:d.getFullYear(),_m:d.getMonth()};km[k][t.type]+=Number(t.amount);});return Object.values(km).sort(function(a,b){return a._y!==b._y?a._y-b._y:a._m-b._m;});}
function payS(y,m){return S.mems.map(function(mb){var tx=S.txs.filter(function(t){return txMatch(t,mb)&&t.type==="deposit"&&new Date(t.date).getFullYear()===y&&new Date(t.date).getMonth()===m;});var paid=tx.length>0,paidAmt=paid?tx.reduce(function(s,t){return s+Number(t.amount);},0):0;var paidDate=paid?tx.sort(function(a,b){return new Date(a.date)-new Date(b.date);})[0].date:null;return Object.assign({},mb,{paid:paid,paidAmt:paidAmt,paidDate:paidDate});});}

// ═══════════ DASHBOARD ═══════════
function pDash(){
  var s=stats(),ps=payS(new Date().getFullYear(),new Date().getMonth());
  var pn=ps.filter(function(m){return m.paid;}).length;
  var up=ps.filter(function(m){return !m.paid;});
  var dom=new Date().getDate(),mn=DM[new Date().getMonth()];
  var isOD=dom>10&&up.length>0,rate=Math.round(pn/S.mems.length*100);
  var GOAL=50000,gp=pct(s.f,GOAL),w=getMyWallet();

  h+="</div></div>";
  // 2 col
  h+="<div style='display:grid;grid-template-columns:"+(mob()?"1fr":"1fr 1fr")+";gap:12px'>";

  var RORD2={admin:0,finance:1,secretary:2,member:3};
  var contribs=S.mems.slice().sort(function(a,b){
    var ra=RORD2[a.role||"member"]||3,rb=RORD2[b.role||"member"]||3;

  }).map(function(m){

  });

  h+="<div style='font-size:12px;font-weight:900;color:var(--grn)'>"+fmt(grandTotal)+"</div></div>";
  h+="<div>";
  contribs.forEach(function(m){
    h+="<div style='display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--bor);gap:10px'>";

    h+="</div>";
  });
  h+="</div>";
  h+="<div style='padding:8px 11px;border-top:1px solid var(--bor)'><button onclick='goPage(\"payments\")' style='width:100%;padding:8px;border-radius:9px;border:1px solid var(--gbr);background:var(--gdm);color:var(--grn);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit'>Monthly Payments →</button></div></div>";
  // Right stats
  h+="<div style='display:flex;flex-direction:column;gap:10px'>";

}

function saveInv(id){
  var nm=($("in-nm")||{value:""}).value.trim(),dt=($("in-dt")||{value:""}).value;
  if(!nm||!dt){toast("Name and date required",false);return;}
  var amt=Number(($("in-am")||{value:0}).value)||0;
  var data={name:nm,description:($("in-ds")||{value:""}).value.trim(),date:dt,sector:($("in-sc")||{value:""}).value.trim(),partner:($("in-pt")||{value:""}).value.trim(),capitalDeployed:amt,amount:amt,expectedReturn:Number(($("in-er")||{value:0}).value)||0,actualReturn:Number(($("in-ar")||{value:0}).value)||0,status:($("in-st")||{value:"planning"}).value,teamMembers:($("in-tm")||{value:""}).value.split(",").map(function(x){return x.trim();}).filter(Boolean),notes:($("in-no")||{value:""}).value.trim()};
  var ex=id?S.invs.find(function(x){return x.id===id;}):null;
  if(ex){if(ex.milestones)data.milestones=ex.milestones;if(ex.collections)data.collections=ex.collections;if(ex.attachments)data.attachments=ex.attachments;}
  var p=id?db.collection("investments").doc(id).update(data):db.collection("investments").add(data);
  p.then(function(){closeModal();logAct(id?"edit_investment":"add_investment",data.name);toast(id?"Updated!":"Project created!");}).catch(function(e){toast(e.message,false);});
}

  var h="<div class='modal-bg' onclick='if(event.target===this)closeModal()'><div class='modal-box'>";

  h+="<div style='background:var(--gdm);border:1px solid var(--gbr);border-radius:10px;padding:10px 13px;margin-bottom:14px'><div style='font-size:12px;color:var(--mut)'>Project</div><div style='font-size:14px;font-weight:800'>"+inv.name+"</div></div>";
  h+="<div class='fc'>";

  h+="<div class='g2'><div><label class='lbl'>Total Collected (kg) *</label><input id='cl-kg' type='number' class='inp' step='0.1' placeholder='0.0'/></div><div><label class='lbl'>Plastic Type</label><input id='cl-tp' type='text' class='inp' placeholder='e.g. PET bottles'/></div></div>";

  h+="<div class='g2'><div><label class='lbl'>Quantity Sold (kg)</label><input id='cl-sk' type='number' class='inp' step='0.1' placeholder='0.0' oninput='calcRevenue()'/></div><div><label class='lbl'>Price per kg (BDT)</label><input id='cl-pp' type='number' class='inp' placeholder='0' oninput='calcRevenue()'/></div></div>";
  h+="<div style='margin-top:10px'><label class='lbl'>Revenue (BDT) — auto calculated</label><input id='cl-rv' type='number' class='inp' placeholder='0'/></div>";
  h+="<div style='margin-top:10px'><label class='lbl'>Sale Notes</label><input id='cl-sn' type='text' class='inp' placeholder='Buyer name, location etc.'/></div>";
  h+="</div>";
  h+="<div><label class='lbl'>Collection Notes</label><input id='cl-nt' type='text' class='inp' placeholder='Any notes...'/></div>";
  h+="<button class='btn-p' onclick='saveCollection(\""+invId+"\")'>Save Entry</button></div></div></div>";
  $("modal").innerHTML=h;
}
function calcRevenue(){
  var sk=Number(($("cl-sk")||{value:0}).value)||0;
  var pp=Number(($("cl-pp")||{value:0}).value)||0;
  var rv=$("cl-rv");if(rv)rv.value=sk&&pp?Math.round(sk*pp):"";
}
function saveCollection(invId){
  var dt=($("cl-dt")||{value:""}).value;var kg=($("cl-kg")||{value:""}).value;
  if(!dt||!kg){toast("Date and collected kg required",false);return;}
  var entry={date:dt,source:($("cl-src")||{value:""}).value.trim(),kg:Number(kg),plasticType:($("cl-tp")||{value:""}).value.trim(),soldKg:Number(($("cl-sk")||{value:0}).value)||0,pricePerKg:Number(($("cl-pp")||{value:0}).value)||0,revenue:Number(($("cl-rv")||{value:0}).value)||0,saleNote:($("cl-sn")||{value:""}).value.trim(),note:($("cl-nt")||{value:""}).value.trim(),addedBy:S.name,addedAt:now()};
  var inv=S.invs.find(function(x){return x.id===invId;});if(!inv)return;
  var cols2=(inv.collections||[]).slice();cols2.push(entry);
  // Also update actual return if revenue added
  var newReturn=Number(inv.actualReturn||0)+entry.revenue;
  db.collection("investments").doc(invId).update({collections:cols2,actualReturn:newReturn}).then(function(){closeModal();logAct("add_collection",entry.kg+"kg from "+entry.source+" — "+inv.name);toast("Collection entry added!");}).catch(function(e){toast(e.message,false);});
}
function delCollection(invId,idx){
  if(!confirm("Delete this entry?"))return;
  var inv=S.invs.find(function(x){return x.id===invId;});if(!inv)return;
  var cols2=(inv.collections||[]).slice();
  var rev=Number(cols2[idx].revenue||0);
  cols2.splice(idx,1);
  var newReturn=Math.max(0,Number(inv.actualReturn||0)-rev);
  db.collection("investments").doc(invId).update({collections:cols2,actualReturn:newReturn}).then(function(){toast("Entry deleted.");}).catch(function(e){toast(e.message,false);});
}
function openMilestone(invId){$("modal").innerHTML="<div class='modal-bg' onclick='if(event.target===this)closeModal()'><div class='modal-box'><div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:18px'><div style='font-weight:800;font-size:17px'>Add Milestone</div><button onclick='closeModal()' style='background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer'>✕</button></div><div class='fc'><div><label class='lbl'>Title *</label><input id='ms-t' type='text' class='inp' placeholder='e.g. First 100kg collected'/></div><div><label class='lbl'>Notes</label><input id='ms-n' type='text' class='inp' placeholder='Details...'/></div><div><label class='lbl'>Date</label><input id='ms-d' type='date' class='inp' value='"+new Date().toISOString().split("T")[0]+"'/></div><label style='display:flex;align-items:center;gap:8px;cursor:pointer'><input type='checkbox' id='ms-dn'/><span style='font-size:13px'>Mark as completed</span></label><button class='btn-p' onclick='saveMilestone(\""+invId+"\")'>Add Milestone</button></div></div></div>";}
function saveMilestone(invId){var t=($("ms-t")||{value:""}).value.trim();if(!t){toast("Title required",false);return;}var inv=S.invs.find(function(x){return x.id===invId;});if(!inv)return;var ms=(inv.milestones||[]).slice();ms.push({title:t,note:($("ms-n")||{value:""}).value.trim(),date:($("ms-d")||{value:""}).value,done:($("ms-dn")||{checked:false}).checked});db.collection("investments").doc(invId).update({milestones:ms}).then(function(){closeModal();toast("Milestone added!");}).catch(function(e){toast(e.message,false);});}
function toggleMilestone(invId,idx){var inv=S.invs.find(function(x){return x.id===invId;});if(!inv)return;var ms=(inv.milestones||[]).slice();ms[idx].done=!ms[idx].done;db.collection("investments").doc(invId).update({milestones:ms}).then(function(){toast(ms[idx].done?"Marked complete!":"Marked incomplete");}).catch(function(e){toast(e.message,false);});}
function delInv(id){if(!confirm("Delete this project? All collection data will be lost."))return;db.collection("investments").doc(id).delete().then(function(){logAct("delete_investment",id);toast("Deleted.");}).catch(function(e){toast(e.message,false);});}

function pTx(){
  var txs=S.txs.filter(function(t){return(S.fT==="all"||t.type===S.fT)&&(S.fMem==="all"||txName(t)===S.fMem);});
  var h="<div class='fc'><div style='display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px'><h2 style='font-size:22px;font-weight:800'>Transactions</h2>"+(canWrite()?"<button class='btn-a' onclick='openTx(null,null)'>+ Add Record</button>":"")+"</div>";
  h+="<div class='card' style='padding:11px 13px'><div style='display:flex;align-items:center;gap:8px;flex-wrap:wrap'>";
  h+="<select class='inp' style='width:auto;padding:7px 10px' onchange='S.fT=this.value;render()'><option value='all'>All Types</option>"+Object.keys(TC).map(function(k){return"<option value='"+k+"'"+(S.fT===k?" selected":"")+">"+TC[k].L+"</option>";}).join("")+"</select>";
  h+="<select class='inp' style='width:auto;padding:7px 10px' onchange='S.fMem=this.value;render()'><option value='all'>All Members</option>"+S.mems.map(function(m){return"<option"+(S.fMem===m.name?" selected":"")+">"+m.name+"</option>";}).join("")+"</select></div></div>";
  if(!txs.length)h+="<div class='card' style='text-align:center;padding:48px;color:var(--mut)'>No transactions found.</div>";
  else{h+="<div class='card' style='padding:0;overflow:hidden'><div class='sw'><table class='tbl'><thead><tr><th>Date</th><th>Type</th><th>Member</th><th>Amount</th><th>Note</th><th></th></tr></thead><tbody>";txs.forEach(function(t){h+="<tr><td style='color:var(--mut);font-size:11px;white-space:nowrap'>"+fd(t.date)+"</td><td>"+txbdg(t.type)+"</td><td style='font-weight:600'>"+txName(t)+"</td><td style='font-weight:700;color:"+(TC[t.type]||TC.deposit).C+"'>"+(t.type==="invest"||t.type==="expense"||t.type==="fine"?"-":"+")+fmt(t.amount)+"</td><td style='color:var(--mut);font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>"+(t.note||"—")+"</td><td>"+(canWrite()?"<div style='display:flex;gap:4px'><button class='btn-s' onclick='openTx(\""+t.id+"\",null)' style='padding:4px 8px'>Edit</button>"+(isAdmin()?"<button class='btn-d' onclick='delTx(\""+t.id+"\")' style='padding:4px 8px'>Del</button>":"")+"</div>":"")+"</td></tr>";});h+="</tbody></table></div></div>";}

function loadDocs(){db.collection("documents").orderBy("createdAt","desc").get().then(function(snap){var docs=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});var el=$("doc-list");if(!el)return;if(!docs.length){el.innerHTML="<div class='card' style='text-align:center;padding:40px;color:var(--mut)'>No documents yet.</div>";return;}el.innerHTML="<div style='display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px'>"+docs.map(function(d){return"<div class='card' style='padding:13px'>"+(d.imageData?"<div style='height:80px;border-radius:7px;overflow:hidden;margin-bottom:9px'><img src='"+d.imageData+"' style='width:100%;height:100%;object-fit:cover'/></div>":"<div style='height:44px;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;margin-bottom:9px;font-size:22px;color:var(--mut)'>📄</div>")+"<div style='font-weight:700;font-size:13px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>"+d.name+"</div><div style='font-size:11px;color:var(--mut);margin-bottom:6px'>"+d.category+"</div>"+(d.url?"<a href='"+d.url+"' target='_blank' style='font-size:11px;color:var(--grn);text-decoration:none'>🔗 Open</a>":"")+(canUploadDoc()?"<button onclick='delDoc(\""+d.id+"\")' class='btn-d' style='width:100%;margin-top:7px;padding:4px;font-size:11px'>Delete</button>":"")+"</div>";}).join("")+"</div>";});}
function openDocForm(){$("modal").innerHTML="<div class='modal-bg' onclick='if(event.target===this)closeModal()'><div class='modal-box'><div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:18px'><div style='font-weight:800;font-size:17px'>Add Document</div><button onclick='closeModal()' style='background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer'>✕</button></div><div class='fc'><div><label class='lbl'>Name *</label><input id='dc-n' type='text' class='inp'/></div><div><label class='lbl'>Category</label><select id='dc-c' class='inp'><option>Meeting Notes</option><option>Financial Report</option><option>Legal</option><option>Research</option><option>Photo</option><option>Other</option></select></div><div><label class='lbl'>URL (optional)</label><input id='dc-u' type='url' class='inp' placeholder='https://...'/></div><div><label class='lbl'>Image (max 500KB)</label><input id='dc-f' type='file' accept='image/*' class='inp' style='padding:8px'/></div><button class='btn-p' onclick='saveDoc()'>Save Document</button></div></div></div>";}
function saveDoc(){var nm=($("dc-n")||{value:""}).value.trim();if(!nm){toast("Name required",false);return;}var fl=($("dc-f")||{files:[]}).files[0];var sv=function(img){db.collection("documents").add({name:nm,category:($("dc-c")||{value:"Other"}).value,url:($("dc-u")||{value:""}).value.trim(),imageData:img||"",addedBy:S.name,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){closeModal();loadDocs();toast("Added!");}).catch(function(e){toast(e.message,false);});};if(fl){if(fl.size>500000){toast("Max 500KB",false);return;}var r=new FileReader();r.onload=function(){sv(r.result);};r.readAsDataURL(fl);}else sv("");}
function delDoc(id){if(!confirm("Delete?"))return;db.collection("documents").doc(id).delete().then(function(){loadDocs();toast("Deleted.");}).catch(function(e){toast(e.message,false);});}

// ═══════════ ACTIVITY ═══════════
function pActivity(){return"<div class='fc'><div><h2 style='font-size:22px;font-weight:800'>Activity Log</h2><p style='font-size:13px;color:var(--mut);margin-top:4px'>Important actions only.</p></div><div id='act-list'><div style='text-align:center;padding:36px;color:var(--mut)'>Loading...</div></div></div>";}
function loadActivity(){db.collection("activity").orderBy("ts","desc").limit(80).get().then(function(snap){var el=$("act-list");if(!el)return;if(snap.empty){el.innerHTML="<div class='card' style='text-align:center;padding:40px;color:var(--mut)'>No activity yet.</div>";return;}var acts=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});var groups={},order=[];acts.forEach(function(a){var d=a.iso?a.iso.split("T")[0]:"Unknown";if(!groups[d]){groups[d]=[];order.push(d);}groups[d].push(a);});var icons={add_transaction:"💸",edit_transaction:"✏️",delete_transaction:"🗑",add_investment:"📈",edit_investment:"✏️",delete_investment:"🗑",post_announcement:"📢",submit_proposal:"📋",distribute_profit:"💰",issue_fine:"⚠",save_member:"💾",change_role:"🔄",reset_members:"♻️",add_member:"➕",remove_member:"➖",add_collection:"📦",add_sale:"💵"};var h="";order.forEach(function(date){h+="<div style='font-size:10px;letter-spacing:2px;color:var(--mut);font-weight:700;padding:7px 0;margin-bottom:3px'>"+fd(date)+"</div><div class='card' style='padding:0;overflow:hidden;margin-bottom:10px'>";groups[date].forEach(function(a,i){var ic=icons[a.action]||"📌";h+="<div style='display:flex;align-items:center;gap:10px;padding:10px 13px;"+(i>0?"border-top:1px solid var(--bor)":"")+"'><div style='width:30px;height:30px;border-radius:9px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0'>"+ic+"</div><div style='flex:1;min-width:0'><div style='font-size:13px;font-weight:600'>"+a.action.replace(/_/g," ")+"</div><div style='font-size:11px;color:var(--mut)'>"+(a.detail||"")+"</div></div><div style='text-align:right;flex-shrink:0'><div style='font-size:12px;font-weight:600'>"+a.by+"</div><div style='font-size:10px;color:var(--mut)'>"+(a.iso?a.iso.split("T")[1].slice(0,5):"")+"</div></div></div>";});h+="</div>";});el.innerHTML=h;});}

// ═══════════ ABOUT ═══════════
function pAbout(){var h="<div class='fc'><div class='hero' style='text-align:center'><div style='font-size:10px;letter-spacing:3px;color:var(--mut);font-weight:700;margin-bottom:14px'>SIPR GROUP</div><div style='font-size:32px;font-weight:900;letter-spacing:-1px;margin-bottom:7px'>Invest. Grow. Prosper.</div><div style='color:var(--mut);font-size:13px'>Founded February 2026 · Boalkhali, Chittagong · "+S.mems.length+" Members</div></div><div class='g2 g2-mob' style='gap:12px'><div class='card'><div style='color:var(--grn);font-size:10px;letter-spacing:2px;font-weight:700;margin-bottom:9px'>MISSION</div><div style='color:var(--mut);font-size:13px;line-height:1.8'>Build a self-sustaining investment group where every member saves, invests, and grows wealth through collective action.</div></div><div class='card'><div style='color:var(--gold);font-size:10px;letter-spacing:2px;font-weight:700;margin-bottom:9px'>VISION</div><div style='color:var(--mut);font-size:13px;line-height:1.8'>Become a formal business within 12 months operating a profitable plastic recycling business along the Karnafuli River.</div></div></div><div class='card'><div style='font-size:11px;letter-spacing:2px;color:var(--mut);font-weight:700;margin-bottom:14px'>FOUNDING MEMBERS</div><div style='display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px'>"+S.mems.map(function(m){var rc={admin:"var(--red)",finance:"var(--gold)",secretary:"var(--teal)",member:"var(--mut)"}[m.role||"member"]||"var(--mut)";return"<div style='background:var(--s2);border-radius:11px;padding:12px;text-align:center;border:1px solid var(--bor)'><div style='display:flex;justify-content:center;margin-bottom:7px'>"+av(m.name,38)+"</div><div style='font-weight:700;font-size:12px'>"+m.name+"</div><div style='font-size:10px;color:"+rc+";margin-top:2px;font-weight:600'>"+m.title+"</div></div>";}).join("")+"</div></div></div>";return h;}

// ═══════════ CONTROL PANEL ═══════════
function pControl(){
  var RC={admin:{L:"Admin (Full Access)",C:"var(--red)"},finance:{L:"Finance (Add Transactions)",C:"var(--gold)"},secretary:{L:"Secretary (Announcements & Docs)",C:"var(--teal)"},member:{L:"Member (Read Only)",C:"var(--mut)"}};
  var h="<div class='fc'><div><h2 style='font-size:22px;font-weight:800'>Control Panel</h2><p style='font-size:13px;color:var(--mut);margin-top:3px'>Manage members, roles and permissions.</p></div>";
  h+="<div id='ctrl-pending'></div>";
  // Role reference card
  h+="<div class='card'><div style='font-size:11px;letter-spacing:2px;color:var(--mut);font-weight:700;margin-bottom:12px'>🔒 ROLE PERMISSIONS</div><div style='display:flex;flex-direction:column;gap:8px'>";
  [["admin","var(--red)","Full access — add/delete/edit everything, manage members, control panel"],["finance","var(--gold)","Add & edit transactions and payments, export CSV"],["secretary","var(--teal)","Post announcements, upload documents"],["member","var(--mut)","View only — cannot add or edit anything"]].forEach(function(r){h+="<div style='display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--s2);border-radius:9px;border:1px solid var(--bor)'><span class='bdg' style='background:"+r[1]+"18;color:"+r[1]+";border:1px solid "+r[1]+"30'>"+r[0]+"</span><div style='font-size:12px;color:var(--mut)'>"+r[2]+"</div></div>";});
  h+="</div></div>";
  // Reset
  h+="<div class='card' style='border-color:var(--gold)22'><div style='display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px'><div><div style='color:var(--gold);font-size:11px;font-weight:700;margin-bottom:3px'>MEMBER DATA RESET</div><div style='color:var(--mut);font-size:12px'>Restore member profiles. Transactions NOT deleted.</div></div><button onclick='resetMembers()' style='padding:9px 15px;border-radius:9px;border:1px solid var(--gold);background:#1c0e00;color:var(--gold);font-weight:700;font-size:12px;cursor:pointer'>⚙ Reset</button></div></div>";
  // Members
  S.mems.forEach(function(m){
    var role=m.role||"member";var rc=RC[role]||RC.member;
    var isSelf=m.email===S.email;
    var sid=m.id.replace(/-/g,"_");
    h+="<div class='card'>";
    h+="<div style='display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap'>"+av(m.name,40)+"<div style='flex:1;min-width:0'><div style='display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px'><span style='font-weight:800;font-size:14px'>"+m.name+"</span>"+(isSelf?"<span class='bdg' style='background:var(--s2);border:1px solid var(--bor);color:var(--mut)'>YOU</span>":"")+"</div><div style='font-size:11px;color:var(--mut)'>"+m.email+"</div><div style='font-size:11px;color:"+rc.C+";font-weight:600;margin-top:2px'>"+rc.L+"</div></div></div>";
    h+="<div class='g2' style='margin-bottom:12px'>";
    h+="<div><label class='lbl'>Name</label><input id='nm-"+sid+"' type='text' class='inp' value='"+m.name+"'/></div>";
    h+="<div><label class='lbl'>Phone</label><input id='ph-"+sid+"' type='text' class='inp' value='"+(m.phone||"")+"'/></div></div>";
    h+="<div style='margin-bottom:12px'><label class='lbl'>Title"+(m.locked?" 🔒":"")+"</label>";
    if(m.locked)h+="<div class='inp' style='color:var(--mut)'>"+m.title+"</div>";
    else h+="<input id='tl-"+sid+"' type='text' class='inp' value='"+m.title+"'/>";
    h+="</div>";
    h+="<div style='margin-bottom:12px'><label class='lbl'>Role & Permissions</label>";
    h+="<select id='rl-"+sid+"' class='inp'>"+Object.keys(RC).map(function(k){return"<option value='"+k+"'"+(role===k?" selected":"")+">"+RC[k].L+"</option>";}).join("")+"</select></div>";
    h+="<div style='background:var(--s2);border-radius:9px;padding:10px 12px;border:1px solid var(--bor);margin-bottom:12px'>";
    h+="<div style='font-size:10px;color:var(--mut);font-weight:700;margin-bottom:5px'>GOOGLE ACCOUNT</div>";
    if(m.googleUid)h+="<div style='font-size:12px;color:var(--grn);font-weight:600;margin-bottom:6px'>✓ Linked"+(m.googleEmail?" ("+m.googleEmail+")":"")+"</div><button onclick='unlinkGoogle(\""+m.id+"\")' class='btn-d' style='font-size:11px;padding:4px 10px'>Unlink</button>";
    else h+="<div style='font-size:12px;color:var(--mut)'>Not linked · Invite code: <strong style=\"color:var(--txt)\">"+m.id+"</strong></div>";
    h+="</div>";
    h+="<button class='btn-p' onclick='saveMemCtrl(\""+m.id+"\",\""+sid+"\","+(m.locked?"true":"false")+")' style='padding:11px'>💾 Save</button>";
    h+="</div>";
  });
  h+="</div>";
  setTimeout(loadPendingApprovals,100);
  return h;
}
function saveMemCtrl(mid,sid,locked){
  var mem=S.mems.find(function(m){return m.id===mid;});if(!mem)return;
  var nm=($("nm-"+sid)||{value:mem.name}).value.trim()||mem.name;
  var ph=($("ph-"+sid)||{value:""}).value.trim();
  var rl=($("rl-"+sid)||{value:mem.role||"member"}).value;
  var upd={name:nm,phone:ph,role:rl};
  if(!locked&&$("tl-"+sid))upd.title=$("tl-"+sid).value.trim()||mem.title;
  db.collection("members").doc(mid).update(upd).then(function(){Object.assign(mem,upd);if(mem.email===S.email){S.name=nm;S.role=rl;setLabels();buildNav();}logAct("save_member",nm);toast("Saved!");}).catch(function(e){toast(e.message,false);});
}
function loadPendingApprovals(){var el=$("ctrl-pending");if(!el)return;db.collection("pendingApprovals").where("status","==","pending").get().then(function(snap){if(snap.empty){el.innerHTML="";return;}el.innerHTML="<div class='card' style='border-color:var(--gold)44;margin-bottom:0'><div style='color:var(--gold);font-size:11px;font-weight:700;margin-bottom:12px'>⏳ PENDING REGISTRATIONS ("+snap.size+")</div><div style='display:flex;flex-direction:column;gap:8px'>"+snap.docs.map(function(doc){var d=doc.data();return"<div style='display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s2);border-radius:10px;border:1px solid var(--bor);flex-wrap:wrap'>"+av(d.name,32)+"<div style='flex:1'><div style='font-weight:700;font-size:13px'>"+d.name+"</div><div style='font-size:11px;color:var(--mut)'>"+d.email+"</div><div style='font-size:11px;color:var(--mut)'>Code: "+d.memberId+"</div></div><div style='display:flex;gap:6px'><button onclick='approveReg(\""+doc.id+"\",\""+d.memberId+"\")' class='btn-a' style='padding:6px 12px;font-size:11px'>Approve</button><button onclick='rejectReg(\""+doc.id+"\",\""+d.memberId+"\")' class='btn-d' style='padding:6px 12px;font-size:11px'>Reject</button></div></div>";}).join("")+"</div></div>";});}
function approveReg(docId,memberId){if(!confirm("Approve this registration?"))return;db.collection("pendingApprovals").doc(docId).update({status:"approved"}).then(function(){return db.collection("members").doc(memberId).update({status:"active"});}).then(function(){toast("Approved!");loadPendingApprovals();}).catch(function(e){toast(e.message,false);});}
function rejectReg(docId,memberId){if(!confirm("Reject?"))return;db.collection("pendingApprovals").doc(docId).update({status:"rejected"}).then(function(){return db.collection("members").doc(memberId).update({status:"rejected"});}).then(function(){toast("Rejected.");loadPendingApprovals();}).catch(function(e){toast(e.message,false);});}
function resetMembers(){if(!confirm("Reset all member profiles to defaults?\n\nThis clears phone numbers, addresses, google links.\nTransactions are NOT deleted."))return;var batch=db.batch();DEF_MEMS.forEach(function(m){batch.set(db.collection("members").doc(m.id),m);});batch.commit().then(function(){loadMembers(function(){render();toast("Members reset!");});logAct("reset_members","All reset");}).catch(function(e){toast(e.message,false);});}

// Close profile on outside click
document.addEventListener("click",function(e){
  var pd=$("prof-drop");
  if(pd&&pd.style.display==="block"&&!e.target.closest("#prof-btn"))pd.style.display="none";
});
</script>
