<style>
:root{--bg:#07090f;--sur:#0e1118;--s2:#13161e;--bor:#1c2030;--txt:#e6e9f0;--mut:#56607a;--grn:#4f8ef7;--gdm:#0a1226;--gbr:#0d1f4a;--gold:#f59e0b;--purple:#8b5cf6;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}
.page{display:none;min-height:100vh;}
.page.show{display:flex;}
.page.showb{display:block;}
/* LOGIN */
#pg-login{align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%,#0d1f4a,var(--bg));}
.lbox{background:var(--sur);border:1px solid var(--bor);border-radius:20px;padding:40px 36px;width:100%;max-width:400px;}
.lbl{display:block;font-size:10px;letter-spacing:2px;color:var(--mut);font-weight:700;margin-bottom:6px;}
.inp{width:100%;background:var(--s2);border:1px solid var(--bor);border-radius:10px;padding:11px 13px;color:var(--txt);font-size:14px;font-family:inherit;outline:none;}
.inp:focus{border-color:var(--grn);}
select.inp{cursor:pointer;}
textarea.inp{resize:vertical;}
.btn-p{width:100%;padding:13px;background:linear-gradient(135deg,var(--gbr),var(--grn));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-g{width:100%;padding:12px;background:var(--s2);border:1px solid var(--bor);color:var(--txt);border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-a{background:var(--gdm);color:var(--grn);border:1px solid var(--gbr);border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-s{background:var(--s2);color:var(--txt);border:1px solid var(--bor);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-d{background:#1a040688;color:#ef4444;border:1px solid #7f1d1d44;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.divider{display:flex;align-items:center;gap:10px;color:var(--mut);font-size:11px;margin:16px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bor);}
.err{color:#f87171;font-size:12px;padding:10px 13px;background:#1a060688;border-radius:8px;border:1px solid #7f1d1d;margin-top:10px;display:none;}
/* APP */
#pg-app{flex-direction:column;}
/* Sidebar */
#sidebar{width:220px;background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column;padding:16px 10px;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:100;transition:transform .25s;}
.nav-logo{text-align:center;padding:8px 0 16px;border-bottom:1px solid var(--bor);margin-bottom:10px;}
.nav-logo .logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--gbr),var(--grn));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;margin:0 auto 6px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--mut);margin-bottom:1px;transition:all .15s;}
.nav-item:hover{background:var(--s2);color:var(--txt);}
.nav-item.active{background:var(--gdm);color:var(--grn);}
/* Main content */
#main{margin-left:220px;flex:1;padding:22px 26px;max-width:940px;}
/* Topbar */
#topbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
#topbar h2{font-size:20px;font-weight:900;flex:1;}
#ham{display:none;background:var(--s2);border:1px solid var(--bor);border-radius:8px;padding:8px 11px;font-size:18px;cursor:pointer;color:var(--txt);}
/* Mobile */
@media(max-width:800px){
  #sidebar{transform:translateX(-220px);}
  #sidebar.open{transform:translateX(0);box-shadow:8px 0 40px #00000099;}
  #main{margin-left:0;padding:14px 14px 80px;}
  #ham{display:block;}
  #bot-nav{display:flex!important;}
}
/* Bottom nav */
#bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bor);z-index:100;padding:5px 0 7px;}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 3px;cursor:pointer;color:var(--mut);font-size:9px;font-weight:700;border:none;background:none;font-family:inherit;}
.bn.active{color:var(--grn);}
.bn .bi{font-size:18px;}
/* Overlay */
#overlay{display:none;position:fixed;inset:0;background:#00000070;z-index:99;}
/* Cards */
.card{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:18px;}
.sc{background:var(--s2);border:1px solid var(--bor);border-radius:12px;padding:14px;}
.hero{background:linear-gradient(135deg,var(--gdm),#0d1424);border:1px solid var(--gbr);border-radius:16px;padding:24px 28px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:600px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}}
.fc{display:flex;flex-direction:column;gap:14px;}
.tab-row{display:flex;gap:5px;flex-wrap:wrap;}
.tab{background:var(--s2);border:1px solid var(--bor);border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--mut);font-family:inherit;}
.tab.active{background:var(--gdm);border-color:var(--gbr);color:var(--grn);}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.pbar{height:5px;background:var(--s2);border-radius:99px;overflow:hidden;}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gbr),var(--grn));}
/* Table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:9px 13px;text-align:left;font-size:10px;letter-spacing:1.5px;color:var(--mut);font-weight:700;border-bottom:1px solid var(--bor);}
.tbl td{padding:10px 13px;border-bottom:1px solid var(--bor);font-size:13px;}
.tbl tr:last-child td{border-bottom:none;}
.sw{overflow-x:auto;}
/* Modal */
.modal-bg{position:fixed;inset:0;background:#00000088;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--sur);border:1px solid var(--bor);border-radius:18px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
/* Profile */
#prof-btn{position:relative;cursor:pointer;}
#prof-drop{display:none;position:absolute;top:48px;right:0;background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:10px;min-width:210px;z-index:200;box-shadow:0 16px 48px #000000aa;}
/* Toast */
#toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 8px 24px #00000060;}
/* Misc */
.live{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite;margin-right:5px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px;height:28px;border:3px solid var(--bor);border-top-color:var(--grn);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}
.pb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bor);}
.pb-row:last-child{border-bottom:none;}
</style>
</head>

function fd(d){ if(!d) return "—"; try{ return new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); }catch(e){ return "—"; } }
function now(){ return new Date().toISOString(); }
function sumT(arr,t){ return arr.filter(function(x){ return x.type===t; }).reduce(function(s,x){ return s+Number(x.amount); },0); }
function pct(v,mx){ return Math.min(Math.round(v/mx*100),100); }
function av(name,sz){
  sz = sz||36;
  var h = (name||"?").split("").reduce(function(a,c){ return a+c.charCodeAt(0); },0)%360;
  var ini = (name||"?").split(" ").map(function(w){ return w[0]||""; }).join("").slice(0,2).toUpperCase();
  return "<div style='width:"+sz+"px;height:"+sz+"px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,hsl("+h+",40%,20%),hsl("+((h+50)%360)+",50%,30%));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:"+Math.round(sz*.35)+"px'>"+ini+"</div>";
}
function txbdg(t){ var c=TC[t]||TC.deposit; return "<span class='bdg' style='background:"+c.B+";color:"+c.C+";border:1px solid "+c.BD+"'>"+c.I+" "+c.L+"</span>"; }

var _tt;
function toast(m,ok){
  ok = ok!==false;
  var t=$("toast");
  t.style.background = ok?"linear-gradient(135deg,#0a1226,#0d1f4a)":"linear-gradient(135deg,#1a0404,#2a0808)";
  t.style.border = "1px solid "+(ok?"var(--grn)":"#ef4444");
  t.style.color = ok?"var(--grn)":"#f87171";
  t.textContent = (ok?"✓ ":"✗ ")+m;
  t.style.display = "block";
  clearTimeout(_tt);
  _tt = setTimeout(function(){ t.style.display="none"; }, 3500);
}

function getMem(email){ return S.mems.find(function(m){ return m.email===email; })||{}; }

function resolveUID(t){
  if(t.memberUID && t.memberUID.indexOf("SIPR26")===0) return t.memberUID;
  if(t.memberEmail){ var mx=S.mems.find(function(x){ return x.email===t.memberEmail; }); if(mx) return mx.id; }
  if(t.member){ var u=NAME_MAP[t.member.toLowerCase().trim()]; if(u) return u; }
  return null;
}
function txName(t){
  var u=resolveUID(t);
  if(u){ var m=S.mems.find(function(x){ return x.id===u; }); if(m) return m.name; }
  return t.member||"Unknown";
}
function txMatch(t,mem){
  var u=resolveUID(t);
  if(u) return u===mem.id;
  return t.member===mem.name;
}
function canWrite(){ return S.role==="admin"||S.role==="manager"; }
function isAdmin(){ return S.role==="admin"; }

function showPage(id){
  ["pg-login","pg-invite","pg-app"].forEach(function(p){
    var el=$(p); if(el){ el.style.display="none"; }
  });
  var el=$(id);
  if(el) el.style.display = (id==="pg-app")?"block":"flex";
}

function gLogin(){

function eLogin(){
  var em=($("em")||{value:""}).value.trim().toLowerCase();
  var pw=($("pw")||{value:""}).value;
  if(!em||!pw){ showErr("lerr","Enter email and password."); return; }
  hideErr("lerr");
  fa.signInWithEmailAndPassword(em,pw).catch(function(e){
    showErr("lerr", e.code==="auth/user-not-found"?"Email not found.":e.code==="auth/wrong-password"?"Wrong password.":e.message);
  });
}

function fPass(){
  var em=($("em")||{value:""}).value.trim();
  if(!em){ showErr("lerr","Enter your email first."); return; }
  fa.sendPasswordResetEmail(em).then(function(){ toast("Reset email sent!"); }).catch(function(e){ showErr("lerr",e.message); });
}

function showReg(){ $("lf").style.display="none"; $("rf").style.display="block"; hideErr("lerr"); }
function showLogin(){ $("lf").style.display="block"; $("rf").style.display="none"; hideErr("lerr"); }
function showErr(id,msg){ var el=$(id); if(el){ el.textContent=msg; el.style.display="block"; } }
function hideErr(id){ var el=$(id); if(el) el.style.display="none"; }

function doReg(){
  var name=($("rn")||{value:""}).value.trim();
  var email=($("re")||{value:""}).value.trim().toLowerCase();
  var pass=($("rp")||{value:""}).value;
  var code=($("rc")||{value:""}).value.trim().toUpperCase();
  if(!name||!email||!pass||!code){ showErr("lerr","All fields required."); return; }
  if(pass.length<6){ showErr("lerr","Password min 6 characters."); return; }
  var mem = S.mems.find(function(m){ return m.id.toUpperCase()===code; });
  if(!mem){ showErr("lerr","Invalid invite code. Ask Jaziro."); return; }
  fa.createUserWithEmailAndPassword(email,pass).then(function(cred){
    return db.collection("members").doc(mem.id).update({email:email,name:name,authUid:cred.user.uid,status:"pending",_registered:true,pendingAt:now()});
  }).then(function(){
    db.collection("pendingApprovals").add({memberId:mem.id,name:name,email:email,requestedAt:now(),status:"pending"}).catch(function(){});
    showLogin(); hideErr("lerr"); toast("Registration submitted! Wait for admin approval.");
  }).catch(function(e){ showErr("lerr",e.message); });
}

function linkCode(){
  var code=($("ic")||{value:""}).value.trim().toUpperCase();
  var err=$("ierr");
  if(!code){ showErr("ierr","Enter your invite code."); return; }
  var user=fa.currentUser; if(!user){ showErr("ierr","Not signed in."); return; }
  var mem = S.mems.find(function(m){ return m.id.toUpperCase()===code; });
  if(!mem){ showErr("ierr","Invalid code. Ask Jaziro."); return; }
  if(mem.googleUid && mem.googleUid!==user.uid){ showErr("ierr","This code is already linked to another account."); return; }
  db.collection("members").doc(mem.id).update({googleUid:user.uid,googleEmail:user.email,_registered:true}).then(function(){
    Object.assign(mem,{googleUid:user.uid,googleEmail:user.email});
    S.email=mem.email; S.name=mem.name||user.displayName; S.uid=user.uid;
    S.role=mem.role||ROLES[mem.email]||"member";
    showPage("pg-app"); initApp();
    toast("Welcome to SIPR, "+S.name+"! 🎉");
  }).catch(function(e){ showErr("ierr","Error: "+e.message); });
}

function doLogout(){
  fa.signOut().then(function(){
    S.email=""; S.name=""; S.role="member"; S.uid="";
    S.txs=[]; S.invs=[]; S.mems=[]; S.wallets=[];
    showPage("pg-login");
  });
}

function changePwModal(){
  closeProf();
  var h="<div class='modal-bg' onclick='if(event.target===this)closeModal()'><div class='modal-box'>";

  h+="<div class='fc'><div><label class='lbl'>New Password</label><input type='password' id='np' class='inp' placeholder='Min 6 characters'/></div>";
  h+="<div><label class='lbl'>Confirm Password</label><input type='password' id='cp' class='inp'/></div>";
  h+="<button class='btn-p' onclick='doCp()'>Update Password</button></div></div></div>";

function doCp(){
  var np=($("np")||{value:""}).value, cp=($("cp")||{value:""}).value;
  if(np.length<6){ toast("Min 6 characters",false); return; }
  if(np!==cp){ toast("Passwords don't match",false); return; }
  var user=fa.currentUser; if(!user){ toast("Not logged in",false); return; }
  user.updatePassword(np).then(function(){ closeModal(); toast("Password updated!"); }).catch(function(e){ toast(e.message,false); });
}

// Auth state listener
fa.onAuthStateChanged(function(user){
  if(!user){ showPage("pg-login"); return; }
  // Load members first
  loadMembers(function(){
    var mem = S.mems.find(function(m){ return m.googleUid===user.uid; }) ||
              S.mems.find(function(m){ return m.email===user.email; });
    if(mem){
      if(mem.status==="pending"){ showPage("pg-login"); showErr("lerr","Your registration is pending admin approval."); fa.signOut(); return; }
      S.email=mem.email; S.name=mem.name||user.displayName||user.email;
      S.uid=user.uid; S.role=mem.role||ROLES[mem.email]||"member";
      showPage("pg-app"); initApp();
    } else {
      // New Google user — needs invite code
      var ip=$("pg-invite");
      if(ip){ ip.style.display="flex"; $("pg-login").style.display="none"; }
      var gi=$("gu-info");
      if(gi) gi.innerHTML=av(user.displayName||user.email,32)+"<div style='margin-left:8px'><div style='font-size:13px;font-weight:700'>"+(user.displayName||"New User")+"</div><div style='font-size:11px;color:var(--mut)'>"+user.email+"</div></div>";
      gi.style.display="flex"; gi.style.alignItems="center";
    }
  });
});

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
function loadMembers(cb){
  db.collection("members").get().then(function(snap){
    if(snap.empty){ S.mems=MEMBERS.slice(); if(cb) cb(); return; }
    var seen={};
    S.mems = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); })
      .filter(function(m){ if(seen[m.email]) return false; seen[m.email]=true; return true; });
    if(cb) cb();
  }).catch(function(){ S.mems=MEMBERS.slice(); if(cb) cb(); });
}

function loadTxs(){
  db.collection("transactions").orderBy("date","desc").onSnapshot(function(snap){
    S.txs = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
    S.txs.forEach(function(t){
      if((!t.memberUID||t.memberUID.indexOf("SIPR26")<0)&&t.member){
        var uid=NAME_MAP[t.member.toLowerCase().trim()];
        if(uid) db.collection("transactions").doc(t.id).update({memberUID:uid}).catch(function(){});
      }
    });
    if(["dashboard","payments","transactions","members","expenses","wallet"].indexOf(S.tab)>=0) render();
  });
}

function loadInvs(){
  db.collection("investments").orderBy("date","desc").onSnapshot(function(snap){
    S.invs = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
    if(S.tab==="dashboard"||S.tab==="investments") render();
  });
}

function loadWallets(){
  db.collection("wallets").onSnapshot(function(snap){
    S.wallets = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
    updateWallet();
    if(S.tab==="wallet") render();
  });
}

function logAct(action,detail){
  var imp=["add_transaction","edit_transaction","delete_transaction","add_investment","edit_investment","delete_investment","post_announcement","submit_proposal","distribute_profit","issue_fine","save_member","change_role","reset_members"];
  if(imp.indexOf(action)<0||!S.name) return;
  db.collection("activity").add({action:action,detail:detail,by:S.name,byEmail:S.email,role:S.role,ts:firebase.firestore.FieldValue.serverTimestamp(),iso:now()}).catch(function(){});
}

function getMyWallet(){
  var me=getMem(S.email); if(!me||!me.id) return {available:0,locked:0,history:[]};
  var w=S.wallets.find(function(x){ return x.memberId===me.id; })||{available:0,locked:0,history:[]};
  var today=new Date(),unlocked=0,locked=0;
  (w.history||[]).forEach(function(e){
    if(e.type==="salary"&&e.locked){
      if(e.unlockDate&&today>=new Date(e.unlockDate)) unlocked+=Number(e.amount);
      else locked+=Number(e.amount);
    }
  });
  return {available:Number(w.available||0)+unlocked,locked:locked,history:w.history||[],docId:w.id};
}
function getMemWallet(mid){
  var w=S.wallets.find(function(x){ return x.memberId===mid; })||{available:0,locked:0};
  return {available:Number(w.available||0),locked:Number(w.locked||0)};
}
function updateWallet(){
  var w=A_getMyWallet();
  var wi="<div style='background:var(--gdm);border:1px solid var(--gbr);border-radius:10px;padding:10px 12px'><div style='font-size:9px;color:var(--mut);font-weight:700;letter-spacing:1px;margin-bottom:4px'>MY WALLET</div><div style='font-size:16px;font-weight:900;color:var(--grn)'>"+fmt(w.available)+"</div>"+(w.locked>0?"<div style='font-size:11px;color:var(--gold);margin-top:2px'>🔒 "+fmt(w.locked)+" locked</div>":"")+"</div>";
  var pdw=$("pd-wallet"); if(pdw) pdw.innerHTML=wi;
}
function A_getMyWallet(){ return getMyWallet(); }

// STATS
// ═══════════════════════════════════════════
function stats(){
  var d=sumT(S.txs,"deposit"),i=sumT(S.txs,"invest"),p=sumT(S.txs,"profit"),e=sumT(S.txs,"expense");
  return {d:d,i:i,p:p,e:e,f:d+p-i-e};
}
function mRows(){
  var km={};
  S.txs.forEach(function(t){
    var d=new Date(t.date),k=DM[d.getMonth()]+" '"+String(d.getFullYear()).slice(2);
    if(!km[k]) km[k]={lab:k,deposit:0,invest:0,profit:0,expense:0,_y:d.getFullYear(),_m:d.getMonth()};
    km[k][t.type]+=Number(t.amount);
  });
  return Object.values(km).sort(function(a,b){ return a._y!==b._y?a._y-b._y:a._m-b._m; });
}
function payS(y,m){
  return S.mems.map(function(mb){
    var tx=S.txs.filter(function(t){ return txMatch(t,mb)&&t.type==="deposit"&&new Date(t.date).getFullYear()===y&&new Date(t.date).getMonth()===m; });
    var paid=tx.length>0, paidAmt=paid?tx.reduce(function(s,t){ return s+Number(t.amount); },0):0;
    var paidDate=paid?tx.sort(function(a,b){ return new Date(a.date)-new Date(b.date); })[0].date:null;
    return Object.assign({},mb,{paid:paid,paidAmt:paidAmt,paidDate:paidDate});
  });
}

function pDash(){
  var s=stats(), ps=payS(new Date().getFullYear(),new Date().getMonth());
  var pn=ps.filter(function(m){ return m.paid; }).length;
  var up=ps.filter(function(m){ return !m.paid; });
  var dom=new Date().getDate(), mn=DM[new Date().getMonth()];
  var isOD=dom>10&&up.length>0;
  var GOAL=50000, gp=pct(s.f,GOAL);
  var w=getMyWallet(), ai=S.invs.filter(function(i){ return i.status==="active"; });
  var h="<div class='fc'>";
  // Fund hero
  h+="<div class='hero'><div style='font-size:10px;letter-spacing:3px;color:var(--mut);font-weight:700;margin-bottom:8px'><span class='live'></span>SIPR GROUP · FUND BALANCE</div>";
  h+="<div style='font-size:"+(mob()?30:44)+"px;font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:4px'>"+fmt(s.f)+"</div>";
  h+="<div style='font-size:12px;color:var(--mut);margin-bottom:12px'>Goal: "+fmt(GOAL)+" · "+gp+"% achieved</div>";
  h+="<div style='height:6px;background:#ffffff0a;border-radius:99px;overflow:hidden;margin-bottom:14px'><div style='height:100%;width:"+gp+"%;background:linear-gradient(90deg,var(--gbr),var(--grn));border-radius:99px'></div></div>";
  h+="<div style='display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bor);border-radius:10px;overflow:hidden'>";
  [["DEP",s.d,"var(--grn)"],["INV",s.i,"var(--gold)"],["PROFIT",s.p,"var(--purple)"],["EXP",s.e,"var(--red)"]].forEach(function(x){
    h+="<div style='background:var(--s2);padding:9px 7px;text-align:center'><div style='font-size:9px;letter-spacing:1px;color:var(--mut);font-weight:700;margin-bottom:3px'>"+x[0]+"</div><div style='font-size:11px;font-weight:800;color:"+x[2]+"'>"+fmt(x[1])+"</div></div>";
  });
  h+="</div></div>";
  // 2-col
  h+="<div style='display:grid;grid-template-columns:"+(mob()?"1fr":"1fr 1fr")+";gap:12px'>";
  // Payment status card
  h+="<div class='card' style='padding:0;overflow:hidden;border-color:"+(isOD?"#7f1d1d":"var(--bor)")+"'>";
  h+="<div style='padding:12px 16px;border-bottom:1px solid var(--bor);display:flex;justify-content:space-between;align-items:center'>";
  h+="<div style='font-size:10px;letter-spacing:2px;color:"+(isOD?"#f87171":"var(--mut)")+";font-weight:700'>"+(isOD?"⚠ OVERDUE":"📅 "+mn.toUpperCase()+" PAYMENTS")+"</div>";
  h+="<div style='font-weight:800;color:"+(pn===9?"var(--grn)":isOD?"#ef4444":"var(--gold)")+";font-size:12px'>"+pn+"/9</div></div>";
  h+="<div style='padding:4px 0'>";
  ps.forEach(function(m){
    h+="<div style='display:flex;align-items:center;padding:7px 14px;border-bottom:1px solid var(--bor);gap:7px'>";

function pDocs(){ return "<div class='fc'><div style='display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px'><h2 style='font-size:22px;font-weight:800'>Documents</h2>"+(canWrite()?"<button class='btn-a' onclick='openDocForm()'>+ Add</button>":"")+"</div><div id='doc-list'><div style='text-align:center;padding:36px;color:var(--mut)'>Loading...</div></div></div>"; }
function loadDocs(){ db.collection("documents").orderBy("createdAt","desc").get().then(function(snap){ var docs=snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); }); var el=$("doc-list"); if(!el) return; if(!docs.length){ el.innerHTML="<div class='card' style='text-align:center;padding:40px;color:var(--mut)'>No documents yet.</div>"; return; } el.innerHTML="<div style='display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px'>"+docs.map(function(d){ return "<div class='card' style='padding:13px'>"+(d.imageData?"<div style='height:80px;border-radius:7px;overflow:hidden;margin-bottom:9px'><img src='"+d.imageData+"' style='width:100%;height:100%;object-fit:cover'/></div>":"<div style='height:44px;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;margin-bottom:9px;font-size:22px;color:var(--mut)'>📄</div>")+"<div style='font-weight:700;font-size:13px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>"+d.name+"</div><div style='font-size:11px;color:var(--mut);margin-bottom:6px'>"+d.category+"</div>"+(d.url?"<a href='"+d.url+"' target='_blank' style='font-size:11px;color:var(--grn);text-decoration:none'>🔗 Open</a>":"")+(isAdmin()?"<button onclick='delDoc(\""+d.id+"\")' class='btn-d' style='width:100%;margin-top:7px;padding:4px;font-size:11px'>Delete</button>":"")+"</div>"; }).join("")+"</div>"; }); }
function openDocForm(){ $("modal").innerHTML="<div class='modal-bg' onclick='if(event.target===this)closeModal()'><div class='modal-box'><div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:18px'><div style='font-weight:800;font-size:17px'>Add Document</div><button onclick='closeModal()' style='background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer'>✕</button></div><div class='fc'><div><label class='lbl'>Name</label><input id='dc-n' type='text' class='inp'/></div><div><label class='lbl'>Category</label><select id='dc-c' class='inp'><option>Meeting Notes</option><option>Financial Report</option><option>Legal</option><option>Research</option><option>Photo</option><option>Other</option></select></div><div><label class='lbl'>URL (optional)</label><input id='dc-u' type='url' class='inp' placeholder='https://...'/></div><div><label class='lbl'>Image (max 500KB)</label><input id='dc-f' type='file' accept='image/*' class='inp' style='padding:8px'/></div><button class='btn-p' onclick='saveDoc()'>Save</button></div></div></div>"; }
function saveDoc(){ var nm=($("dc-n")||{value:""}).value.trim(); if(!nm){ toast("Name required",false); return; } var fl=($("dc-f")||{files:[]}).files[0]; var sv=function(img){ db.collection("documents").add({name:nm,category:($("dc-c")||{value:"Other"}).value,url:($("dc-u")||{value:""}).value.trim(),imageData:img||"",addedBy:S.name,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){ closeModal(); loadDocs(); toast("Added!"); }).catch(function(e){ toast(e.message,false); }); }; if(fl){ if(fl.size>500000){ toast("Max 500KB",false); return; } var r=new FileReader(); r.onload=function(){ sv(r.result); }; r.readAsDataURL(fl); } else sv(""); }
function delDoc(id){ if(!confirm("Delete?")) return; db.collection("documents").doc(id).delete().then(function(){ loadDocs(); toast("Deleted."); }).catch(function(e){ toast(e.message,false); }); }

// ═══════════════════════════════════════════
// ACTIVITY
// ═══════════════════════════════════════════
function pActivity(){ return "<div class='fc'><div><h2 style='font-size:22px;font-weight:800'>Activity Log</h2><p style='font-size:13px;color:var(--mut);margin-top:4px'>Financial actions only.</p></div><div id='act-list'><div style='text-align:center;padding:36px;color:var(--mut)'>Loading...</div></div></div>"; }
function loadActivity(){ db.collection("activity").orderBy("ts","desc").limit(80).get().then(function(snap){ var el=$("act-list"); if(!el) return; if(snap.empty){ el.innerHTML="<div class='card' style='text-align:center;padding:40px;color:var(--mut)'>No activity yet.</div>"; return; } var acts=snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); }); var groups={},order=[]; acts.forEach(function(a){ var d=a.iso?a.iso.split("T")[0]:"Unknown"; if(!groups[d]){ groups[d]=[]; order.push(d); } groups[d].push(a); }); var icons={add_transaction:"💸",edit_transaction:"✏️",delete_transaction:"🗑",add_investment:"📈",edit_investment:"✏️",delete_investment:"🗑",post_announcement:"📢",submit_proposal:"📋",distribute_profit:"💰",issue_fine:"⚠",save_member:"💾",change_role:"🔄",reset_members:"♻️"}; var h=""; order.forEach(function(date){ h+="<div style='font-size:10px;letter-spacing:2px;color:var(--mut);font-weight:700;padding:7px 0;margin-bottom:3px'>"+fd(date)+"</div><div class='card' style='padding:0;overflow:hidden;margin-bottom:10px'>"; groups[date].forEach(function(a,i){ var ic=icons[a.action]||"📌"; h+="<div style='display:flex;align-items:center;gap:10px;padding:11px 14px;"+(i>0?"border-top:1px solid var(--bor)":"")+"'><div style='width:30px;height:30px;border-radius:9px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0'>"+ic+"</div><div style='flex:1;min-width:0'><div style='font-size:13px;font-weight:600'>"+a.action.replace(/_/g," ")+"</div><div style='font-size:11px;color:var(--mut)'>"+(a.detail||"")+"</div></div><div style='text-align:right;flex-shrink:0'><div style='font-size:12px;font-weight:600'>"+a.by+"</div><div style='font-size:10px;color:var(--mut)'>"+(a.iso?a.iso.split("T")[1].slice(0,5):"")+"</div></div></div>"; }); h+="</div>"; }); el.innerHTML=h; }); }

// ═══════════════════════════════════════════
// ABOUT
// ═══════════════════════════════════════════
function pAbout(){ var h="<div class='fc'><div class='hero' style='text-align:center'><div style='font-size:10px;letter-spacing:3px;color:var(--mut);font-weight:700;margin-bottom:14px'>SIPR GROUP</div><div style='font-size:34px;font-weight:900;letter-spacing:-1px;margin-bottom:7px'>Invest. Grow. Prosper.</div><div style='color:var(--mut);font-size:13px'>Founded February 2026 · Dhaka, Bangladesh · 9 Members</div></div><div class='g2' style='gap:12px'><div class='card'><div style='color:var(--grn);font-size:10px;letter-spacing:2px;font-weight:700;margin-bottom:9px'>MISSION</div><div style='color:var(--mut);font-size:13px;line-height:1.8'>Build a self-sustaining investment group through collective action and disciplined contribution.</div></div><div class='card'><div style='color:var(--gold);font-size:10px;letter-spacing:2px;font-weight:700;margin-bottom:9px'>VISION</div><div style='color:var(--mut);font-size:13px;line-height:1.8'>Become a formal business within 12 months operating a profitable plastic recycling business.</div></div></div><div class='card'><div style='font-size:11px;letter-spacing:2px;color:var(--mut);font-weight:700;margin-bottom:16px'>FOUNDING MEMBERS</div><div style='display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px'>"+S.mems.map(function(m){ return "<div style='background:var(--s2);border-radius:11px;padding:12px;text-align:center;border:1px solid var(--bor)'><div style='display:flex;justify-content:center;margin-bottom:7px'>"+av(m.name,38)+"</div><div style='font-weight:700;font-size:12px'>"+m.name+"</div><div style='font-size:10px;color:var(--mut);margin-top:2px'>"+m.title+"</div></div>"; }).join("")+"</div></div></div>"; return h; }

// ═══════════════════════════════════════════
// CONTROL PANEL
// ═══════════════════════════════════════════
function pControl(){
  var RC={admin:{L:"Admin",C:"var(--red)"},manager:{L:"Manager",C:"var(--gold)"},member:{L:"Member",C:"var(--grn)"}};
  var h="<div class='fc'><div><h2 style='font-size:22px;font-weight:800'>Control Panel</h2></div>";
  h+="<div id='ctrl-pending'></div>";
  h+="<div class='card' style='border-color:var(--gold)22'><div style='display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px'><div><div style='color:var(--gold);font-size:11px;font-weight:700;margin-bottom:3px'>MEMBER DATA RESET</div><div style='color:var(--mut);font-size:12px'>Restore member profiles to defaults.</div></div><button onclick='resetMembers()' style='padding:9px 16px;border-radius:9px;border:1px solid var(--gold);background:#1c0e00;color:var(--gold);font-weight:700;font-size:12px;cursor:pointer'>⚙ Reset</button></div></div>";
  S.mems.forEach(function(m){
    var role=m.role||ROLES[m.email]||"member"; var rc=RC[role]||RC.member; var isSelf=m.email===S.email;
    var sid=m.id.replace(/-/g,"_");
    h+="<div class='card'>";
    h+="<div style='display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap'>"+av(m.name,42)+"<div style='flex:1;min-width:0'><div style='display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px'><span style='font-weight:800;font-size:15px'>"+m.name+"</span>"+(isSelf?"<span class='bdg' style='background:var(--s2);border:1px solid var(--bor);color:var(--mut)'>YOU</span>":"")+"<span class='bdg' style='background:"+rc.C+"18;color:"+rc.C+";border:1px solid "+rc.C+"30'>"+rc.L+"</span></div><div style='font-size:11px;color:var(--mut)'>"+m.email+"</div><div style='font-size:11px;color:var(--mut)'>"+(m.googleUid?"✓ Google linked":"Google not linked")+"</div></div></div>";
    h+="<div class='g2' style='margin-bottom:12px'>";
    h+="<div><label class='lbl'>Name</label><input id='nm-"+sid+"' type='text' class='inp' value='"+m.name+"'/></div>";
    h+="<div><label class='lbl'>Phone</label><input id='ph-"+sid+"' type='text' class='inp' value='"+(m.phone||"")+"'/></div>";
    h+="<div><label class='lbl'>Gmail</label><input id='gm-"+sid+"' type='email' class='inp' value='"+(m.gmail||"")+"'/></div>";
    h+="<div><label class='lbl'>Address</label><input id='ad-"+sid+"' type='text' class='inp' value='"+(m.address||"")+"'/></div></div>";
    h+="<div style='margin-bottom:12px'><label class='lbl'>Title"+(m.locked?" 🔒":"")+"</label>";
    if(m.locked) h+="<div class='inp' style='color:var(--mut);cursor:not-allowed'>"+m.title+"</div>";
    else{ h+="<select id='tl-"+sid+"' class='inp'>"+["President & Founder","Treasurer","Accounts Officer","Fund Collector","Legal Officer","Research Officer","Tech Officer","Operations Officer","Adviser"].map(function(t){ return "<option"+(t===m.title?" selected":"")+">"+t+"</option>"; }).join("")+"</select>"; }
    h+="</div>";
    h+="<div style='background:var(--s2);border-radius:10px;padding:10px 12px;border:1px solid var(--bor);margin-bottom:12px'><div style='font-size:10px;color:var(--mut);font-weight:700;letter-spacing:1.5px;margin-bottom:7px'>PLATFORM ROLE</div><div style='display:flex;gap:7px;flex-wrap:wrap'>"+Object.keys(RC).map(function(k){ var v=RC[k],isCur=role===k; return "<button onclick='"+(isCur?"":"changeRole(\""+m.email+"\",\""+k+"\")")+"' style='padding:6px 14px;border-radius:99px;border:1px solid "+(isCur?v.C+"60":"var(--bor)")+";background:"+(iCur?v.C+"18":"var(--sur)")+";color:"+(isCur?v.C:"var(--mut)")+";font-size:12px;font-weight:700;cursor:"+(isCur?"default":"pointer")+";font-family:inherit'>"+(isCur?"✓ ":"")+v.L+"</button>"; }).join("")+"</div></div>";
    h+="<button class='btn-p' onclick='saveMem(\""+m.email+"\",\""+sid+"\","+(m.locked?"true":"false")+")' style='padding:11px'>💾 Save Profile</button></div>";
  });
  h+="</div>";
  setTimeout(loadPendingApprovals, 100);
  return h;
}
function loadPendingApprovals(){ var el=$("ctrl-pending"); if(!el) return; db.collection("pendingApprovals").where("status","==","pending").get().then(function(snap){ if(snap.empty){ el.innerHTML=""; return; } el.innerHTML="<div class='card' style='border-color:var(--gold)44;margin-bottom:0'><div style='color:var(--gold);font-size:11px;font-weight:700;margin-bottom:12px'>⏳ PENDING REGISTRATIONS ("+snap.size+")</div><div style='display:flex;flex-direction:column;gap:9px'>"+snap.docs.map(function(doc){ var d=doc.data(); return "<div style='display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s2);border-radius:10px;border:1px solid var(--bor);flex-wrap:wrap'>"+av(d.name,34)+"<div style='flex:1'><div style='font-weight:700;font-size:13px'>"+d.name+"</div><div style='font-size:11px;color:var(--mut)'>"+d.email+"</div></div><div style='display:flex;gap:6px'><button onclick='approveReg(\""+doc.id+"\",\""+d.memberId+"\")' class='btn-a' style='padding:7px 12px;font-size:11px'>Approve</button><button onclick='rejectReg(\""+doc.id+"\",\""+d.memberId+"\")' class='btn-d' style='padding:7px 12px;font-size:11px'>Reject</button></div></div>"; }).join("")+"</div></div>"; }); }
function approveReg(docId,memberId){ if(!confirm("Approve?")) return; db.collection("pendingApprovals").doc(docId).update({status:"approved"}).then(function(){ return db.collection("members").doc(memberId).update({status:"active"}); }).then(function(){ toast("Approved!"); loadPendingApprovals(); }).catch(function(e){ toast(e.message,false); }); }
function rejectReg(docId,memberId){ if(!confirm("Reject?")) return; db.collection("pendingApprovals").doc(docId).update({status:"rejected"}).then(function(){ return db.collection("members").doc(memberId).update({status:"rejected"}); }).then(function(){ toast("Rejected."); loadPendingApprovals(); }).catch(function(e){ toast(e.message,false); }); }
function saveMem(email,sid,locked){ var nm=($("nm-"+sid)||{value:""}).value.trim(),ph=($("ph-"+sid)||{value:""}).value.trim(),gm=($("gm-"+sid)||{value:""}).value.trim(),ad=($("ad-"+sid)||{value:""}).value.trim(),tl=$("tl-"+sid)?$("tl-"+sid).value:""; var upd={name:nm,phone:ph,gmail:gm,address:ad,_registered:true}; if(!locked&&tl) upd.title=tl; var mem=S.mems.find(function(m){ return m.email===email; }); if(!mem){ toast("Not found",false); return; } db.collection("members").doc(mem.id).update(upd).then(function(){ Object.assign(mem,upd); if(email===S.email){ S.name=nm; setLabels(); } logAct("save_member",nm); toast("Saved!"); }).catch(function(e){ toast(e.message,false); }); }
function changeRole(email,nr){ var mem=S.mems.find(function(m){ return m.email===email; }); var rn={admin:"Admin",manager:"Manager",member:"Member"}; if(email===S.email&&nr!=="admin"){ if(!confirm("⚠ You will lose Admin access. Continue?")) return; } else if(!confirm("Change "+(mem?mem.name:email)+" to "+rn[nr]+"?")) return; ROLES[email]=nr; if(mem) mem.role=nr; db.collection("members").doc(mem.id).update({role:nr}).catch(function(){}); if(email===S.email){ S.role=nr; buildNav(); setLabels(); goPage("dashboard"); } else{ toast((mem?mem.name:email)+" is now "+rn[nr]+"!"); goPage("control"); } logAct("change_role",(mem?mem.name:email)+" → "+rn[nr]); }
function resetMembers(){ if(!confirm("Reset all member profiles to defaults?\n\nTransactions are NOT deleted.")) return; var batch=db.batch(); MEMBERS.forEach(function(m){ batch.set(db.collection("members").doc(m.id),m); }); batch.commit().then(function(){ loadMembers(function(){ goPage("control"); toast("Members reset!"); }); logAct("reset_members","All reset"); }).catch(function(e){ toast(e.message,false); }); }

// ═══════════════════════════════════════════
// CLICK OUTSIDE TO CLOSE
// ═══════════════════════════════════════════
document.addEventListener("click", function(e){
  var pd=$("prof-drop");
  if(pd && pd.style.display==="block" && !e.target.closest("#prof-btn")) pd.style.display="none";
});

// Init — show app page hidden until auth resolves
document.getElementById("pg-app").style.display="none";
</script>
</body>
</html>
